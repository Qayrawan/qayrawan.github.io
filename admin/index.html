<body>

  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { 
  getFirestore, 
  doc, 
  setDoc, 
  getDoc 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import { 
  getStorage 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyD3vUPTVJoa3-CUvscE9rq4gGOg-SAko2k",
  authDomain: "qayrawan-school-system.firebaseapp.com",
  projectId: "qayrawan-school-system",
  storageBucket: "qayrawan-school-system.firebasestorage.app",
  messagingSenderId: "785321248181",
  appId: "1:785321248181:web:643e6d29cdca556218c5fc"
};

const app = initializeApp(firebaseConfig);

// 🔥 CONNECT SERVICES
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

// 🌍 Make them global so your other scripts can use them
window.auth = auth;
window.db = db;
window.storage = storage;

// Optional but IMPORTANT later
window.createUser = createUserWithEmailAndPassword;
window.signIn = signInWithEmailAndPassword;
window.onAuthStateChanged = onAuthStateChanged;
window.setDoc = setDoc;
window.getDoc = getDoc;
window.doc = doc;

console.log("Firebase fully connected. Now try not to break it.");
  </script>
