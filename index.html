<!DOCTYPE html>
<html>
<head>
  <title>School Login</title>
</head>

<body>

  <h2>School System Login</h2>

  <input id="username" placeholder="Username">
  <br><br>

  <input id="password" type="password" placeholder="Password">
  <br><br>

  <button onclick="login()">Login</button>

  <p id="msg"></p>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD3vUPTVJoa3-CUvscE9rq4gGOg-SAko2k",
    authDomain: "qayrawan-school-system.firebaseapp.com",
    projectId: "qayrawan-school-system",
    storageBucket: "qayrawan-school-system.firebasestorage.app",
    messagingSenderId: "785321248181",
    appId: "1:785321248181:web:643e6d29cdca556218c5fc"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // expose for later use
  window.auth = auth;
  window.db = db;
  import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

window.login = async function () {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const msg = document.getElementById("msg");

  try {
    const q = query(
      collection(db, "users"),
      where("username", "==", username),
      where("password", "==", password)
    );

    const snapshot = await getDocs(q);

    if (snapshot.empty) {
      msg.innerText = "❌ Wrong username or password";
      return;
    }

    const userData = snapshot.docs[0].data();

    msg.innerText = "✅ Login success!";

    // redirect based on role
    if (userData.role === "student") {
      window.location.href = "student.html";
    } else if (userData.role === "teacher") {
      window.location.href = "teacher.html";
    } else if (userData.role === "admin") {
      window.location.href = "admin.html";
    }

  } catch (error) {
    msg.innerText = "⚠️ Error logging in";
    console.error(error);
  }
};
</script>
</body>
</html>
