<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Qayrawan App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <!-- TOP BAR -->
    <header class="topbar">
      <div class="title">Qayrawan</div>
      <div class="status">Beta</div>
    </header>

    <!-- MAIN DASHBOARD -->
    <section class="dashboard">

      <div class="tile" onclick="openPage('announcements')">
        <div class="icon">📢</div>
        <div class="label">Announcements</div>
      </div>

      <div class="tile" onclick="openPage('classes')">
        <div class="icon">📚</div>
        <div class="label">Classes</div>
      </div>

      <div class="tile" onclick="openPage('homework')">
        <div class="icon">📝</div>
        <div class="label">Homework</div>
      </div>

      <div class="tile" onclick="openPage('profile')">
        <div class="icon">👤</div>
        <div class="label">Profile</div>
      </div>

    </section>

    <!-- FOOTER INFO -->
    <footer class="footer">
      Al-Qayrawan High School • Baghdad, Iraq
    </footer>

  </div>

  <script>
    function openPage(page){
      alert("Opening: " + page);
    }
  </script>

</body>
</html>
