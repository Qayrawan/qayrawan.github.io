<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Qayrawan</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="logo">≡ Qayrawan</div>

      <button onclick="openPage('announcements')">📢 Announcements</button>
      <button onclick="openPage('classes')">📚 Classes</button>
      <button onclick="openPage('homework')">📝 Homework</button>
      <button onclick="openPage('profile')">👤 Profile</button>
    </aside>

    <!-- MAIN AREA -->
    <main class="main">
      <h1 id="title">Dashboard</h1>
      <p id="content">Select a section from the menu.</p>
    </main>

  </div>

  <script>
    function openPage(page){
      document.getElementById("title").innerText = page.toUpperCase();
      document.getElementById("content").innerText = "You opened " + page + " section.";
    }
  </script>

</body>
</html>      <div class="tile" onclick="openPage('profile')">

        <div class="label">Profile</div>
      </div>

    </section>

    <!-- FOOTER INFO -->
    <footer class="footer">
      Al-Qayrawan High School • Baghdad, Iraq
    </footer>

  </div>

  <script>
    function openPage(page){
      alert("Opening: " + page);
    }
  </script>

</body>
</html>
