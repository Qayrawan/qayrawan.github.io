<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <title>تسجيل الدخول</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: monospace;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      width: 100%;
      max-width: 350px;
      border: 1px solid #334155;
      animation: fadeIn 0.3s ease;
    }

    h2 {
      text-align: center;
      color: #38bdf8;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #0f172a;
      color: white;
      outline: none;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #38bdf8;
      color: black;
      cursor: pointer;
      transition: 0.2s;
      font-weight: bold;
    }

    button:hover {
      background: #0ea5e9;
      transform: scale(1.03);
    }

    .error {
      color: #ef4444;
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
      min-height: 20px;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(10px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<div class="card">
  <h2>⚡ تسجيل الدخول</h2>

  <input id="username" placeholder="اسم المستخدم">
  <input id="password" type="password" placeholder="كلمة المرور">

  <button onclick="login()">دخول</button>

  <div class="error" id="error"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyD3vUPTVJoa3-CUvscE9rq4gGOg-SAko2k",
  authDomain: "qayrawan-school-system.firebaseapp.com",
  projectId: "qayrawan-school-system",
  storageBucket: "qayrawan-school-system.firebasestorage.app",
  messagingSenderId: "785321248181",
  appId: "1:785321248181:web:643e6d29cdca556218c5fc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🧠 LOGIN ENGINE */
window.login = async () => {
  const userInput = document.getElementById("username").value.trim();
  const passInput = document.getElementById("password").value.trim();
  const errorBox = document.getElementById("error");

  errorBox.innerText = "";

  if (!userInput || !passInput) {
    errorBox.innerText = "يرجى إدخال جميع البيانات";
    return;
  }

  try {
    const snap = await getDocs(collection(db, "users"));

    let found = false;

    snap.forEach(doc => {
      const data = doc.data();

      if (data.username === userInput && data.password === passInput) {
        found = true;

        /* 🧩 CLEAN SESSION OBJECT */
        const sessionUser = {
          uid: doc.id,
          name: data.name || "Student",
          username: data.username,
          class: data.class || "-",
          role: data.role || "student",
          pfp: data.pfp || "placeholder.png"
        };

        localStorage.setItem("user", JSON.stringify(sessionUser));

        /* 🚀 ROUTE USERS */
        if (sessionUser.role === "admin") {
          location.href = "admin.html";
        } else if (sessionUser.role === "teacher") {
          location.href = "teacher.html";
        } else {
          location.href = "student.html";
        }
      }
    });

    if (!found) {
      errorBox.innerText = "بيانات غير صحيحة";
    }

  } catch (err) {
    console.error(err);
    errorBox.innerText = "خطأ في الاتصال بالخادم";
  }
};
</script>

</body>
</html>
