<!DOCTYPE html>
<html>
<head>
  <title>School Login</title>
</head>

<body>

  <h2>School System Login</h2>

  <input id="username" placeholder="Username">
  <br><br>

  <input id="password" type="password" placeholder="Password">
  <br><br>

  <button onclick="login()">Login</button>

  <p id="msg"></p>

  <!-- FIREBASE + LOGIN LOGIC -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } 
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // 🔥 Your Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyD3vUPTVJoa3-CUvscE9rq4gGOg-SAko2k",
      authDomain: "qayrawan-school-system.firebaseapp.com",
      projectId: "qayrawan-school-system",
      storageBucket: "qayrawan-school-system.firebasestorage.app",
      messagingSenderId: "785321248181",
      appId: "1:785321248181:web:643e6d29cdca556218c5fc"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 🌐 LOGIN FUNCTION (Option 1: Firestore username system)
    window.login = async function () {

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const msg = document.getElementById("msg");

      try {
        const q = query(
          collection(db, "users"),
          where("username", "==", username)
        );

        const snapshot = await getDocs(q);

        if (snapshot.empty) {
          msg.innerText = "❌ User not found";
          return;
        }

        const userData = snapshot.docs[0].data();

        if (userData.password !== password) {
          msg.innerText = "❌ Wrong password";
          return;
        }

        msg.innerText = "✅ Login successful!";

        // 🚪 Redirect based on role
        if (userData.role === "student") {
          window.location.href = "student.html";
        } 
        else if (userData.role === "teacher") {
          window.location.href = "teacher.html";
        } 
        else if (userData.role === "admin") {
          window.location.href = "admin.html";
        }

      } catch (error) {
        console.error(error);
        msg.innerText = "⚠️ Something went wrong";
      }
    };

  </script>

</body>
</html>
