<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <title>لوحة الادمن</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: monospace;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 15px;
    }

    h2 {
      text-align: center;
      color: #38bdf8;
      margin-bottom: 5px;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
      border: 1px solid #334155;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #0f172a;
      color: white;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #38bdf8;
      color: black;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    .user {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
    }

    .user-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    img {
      width: 45px;
      height: 45px;
      border-radius: 50%;
    }

    .edit-box {
      display: none;
      margin-top: 10px;
      border-top: 1px solid #334155;
      padding-top: 10px;
    }

    .edit-box.active {
      display: block;
    }

    .actions button {
      margin-left: 5px;
    }

    .top-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .counter {
      text-align: center;
      color: #94a3b8;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">

<h2>⚡ لوحة تحكم الادمن</h2>

<!-- 🔍 البحث -->
<div class="card top-bar">
  <input id="search" placeholder="بحث عن مستخدم..." oninput="loadUsers()">
  
  <select id="classFilter" onchange="loadUsers()">
    <option value="">كل الصفوف</option>
    <option>7A</option><option>7B</option><option>7C</option>
    <option>8A</option><option>8B</option><option>8C</option>
    <option>9A</option><option>9B</option><option>9C</option>
    <option>10A</option><option>10B</option><option>10C</option>
    <option>11A</option><option>11B</option><option>11C</option>
    <option>12A</option><option>12B</option><option>12C</option>
  </select>
</div>

<!-- ➕ انشاء مستخدم -->
<div class="card">
  <h3>انشاء مستخدم</h3>

  <div class="form-grid">
    <input id="displayName" placeholder="الاسم الظاهر">
    <input id="username" placeholder="اسم المستخدم">
    <input id="password" placeholder="كلمة المرور">
    <input id="pfp" placeholder="رابط الصورة">

    <select id="class">
      <option value="">الصف</option>
      <option>7A</option><option>7B</option><option>7C</option>
      <option>8A</option><option>8B</option><option>8C</option>
      <option>9A</option><option>9B</option><option>9C</option>
      <option>10A</option><option>10B</option><option>10C</option>
      <option>11A</option><option>11B</option><option>11C</option>
      <option>12A</option><option>12B</option><option>12C</option>
    </select>

    <select id="role">
      <option value="student">طالب</option>
      <option value="teacher">مدرس</option>
      <option value="admin">ادمن</option>
    </select>

    <button onclick="createUser()">انشاء مستخدم</button>
  </div>
</div>

<!-- 👥 المستخدمين -->
<div class="card">
  <h3>المستخدمين</h3>
  <div class="counter" id="counter"></div>
  <div id="usersList"></div>
</div>

<button onclick="logout()">تسجيل خروج</button>

</div>

<script type="module">
// ⚠️ نفس الكود تبعك بدون تغيير (عشان ما ينكسر)
</script>

</body>
</html>
