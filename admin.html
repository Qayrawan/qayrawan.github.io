<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة الادمن</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #0f172a; color: white; overflow-x: hidden; padding-bottom: 70px; }
.topbar { height: 60px; background: #111827; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; border-bottom: 1px solid #1f2937; position: fixed; top: 0; left: 0; right: 0; z-index: 50; }
.topbar-title { font-weight: bold; font-size: 17px; color: #38bdf8; }
.logout-btn { background: #ef4444; border: none; color: white; padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; }
.logout-btn:hover { background: #dc2626; }
.bottomnav { position: fixed; bottom: 0; left: 0; right: 0; height: 64px; background: #111827; border-top: 1px solid #1f2937; display: flex; z-index: 50; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 10px; color: #6b7280; gap: 3px; transition: color 0.2s; user-select: none; }
.nav-item .icon { font-size: 18px; }
.nav-item.active { color: #38bdf8; }
.section { display: none; position: fixed; top: 60px; left: 0; right: 0; bottom: 64px; overflow-y: auto; padding: 14px; -webkit-overflow-scrolling: touch; }
.section.active { display: block; }
.card { background: #1f2937; border-radius: 14px; padding: 16px; margin-bottom: 14px; border: 1px solid #334155; }
.card-title { font-size: 13px; font-weight: bold; color: #94a3b8; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.stat-card { background: #1f2937; border-radius: 12px; padding: 16px; text-align: center; border: 1px solid #334155; }
.stat-num   { font-size: 30px; font-weight: bold; color: #38bdf8; }
.stat-label { font-size: 12px; color: #9ca3af; margin-top: 4px; }
.field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
.field label { font-size: 12px; color: #94a3b8; }
.input-row { display: flex; gap: 6px; align-items: center; }
.input-row input { flex: 1; }
input[type=text], input[type=password], select, textarea { width: 100%; padding: 10px 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; font-size: 14px; font-family: Arial; outline: none; transition: border-color 0.2s; }
input:focus, select:focus, textarea:focus { border-color: #38bdf8; }
textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn { padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.2s; width: 100%; margin-top: 4px; font-family: Arial; }
.btn-primary { background: #2563eb; color: white; }
.btn-primary:hover { background: #1d4ed8; }
.btn-danger  { background: #ef4444; color: white; }
.btn-danger:hover { background: #dc2626; }
.btn-ghost { background: #374151; color: #cbd5e1; padding: 6px 12px; width: auto; font-size: 12px; }
.btn-ghost:hover { background: #4b5563; }
.btn-success { background: #059669; color: white; }
.btn-success:hover { background: #047857; }
.btn-icon { background: #374151; border: 1px solid #334155; color: #94a3b8; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 16px; flex-shrink: 0; transition: 0.2s; width: auto; margin: 0; }
.btn-icon:hover { border-color: #38bdf8; color: #38bdf8; }
.search-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.search-bar input  { flex: 1; min-width: 120px; }
.search-bar select { width: 130px; flex-shrink: 0; }
.tags-wrap { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 0 2px; }
.tag { padding: 5px 12px; border-radius: 20px; font-size: 12px; border: 1px solid #334155; background: #0f172a; color: #6b7280; cursor: pointer; transition: all 0.18s; user-select: none; }
.tag.selected       { background: #1e3a5f; color: #38bdf8; border-color: #38bdf8; font-weight: bold; }
.tag.selected-green { background: #14532d; color: #4ade80; border-color: #4ade80; font-weight: bold; }
.teacher-only { display: none; border-top: 1px solid #1f2937; margin-top: 10px; padding-top: 10px; }
.teacher-only.visible { display: block; }
.student-only.hidden { display: none; }
.target-badge { display: inline-block; font-size: 11px; font-weight: bold; padding: 2px 10px; border-radius: 20px; margin-bottom: 6px; }
.target-all   { background: #1e3a5f; color: #38bdf8; }
.target-class { background: #14532d; color: #4ade80; }
.user-card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; transition: border-color 0.2s; }
.user-card:hover { border-color: #334155; }
.user-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.user-info { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.user-pfp  { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 2px solid #334155; }
.user-name { font-size: 14px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; }
.user-meta { font-size: 11px; color: #6b7280; margin-top: 2px; }
.role-badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: bold; display: inline-block; margin-top: 3px; }
.role-student { background: #1e3a5f; color: #38bdf8; }
.role-teacher { background: #14532d; color: #4ade80; }
.role-admin   { background: #4c0519; color: #f87171; }
.user-actions { display: flex; gap: 6px; flex-shrink: 0; }
.edit-panel { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid #1f2937; }
.edit-panel.open { display: block; }
.ann-card { background: #111827; border: 1px solid #1f2937; border-right: 3px solid #38bdf8; border-radius: 0 12px 12px 0; padding: 12px 14px; margin-bottom: 10px; }
.ann-title { font-weight: bold; font-size: 14px; margin-bottom: 4px; }
.ann-text  { font-size: 13px; color: #cbd5e1; line-height: 1.5; }
.ann-meta  { font-size: 11px; color: #475569; margin-top: 6px; }
.ann-img   { max-width: 100%; border-radius: 8px; margin-top: 8px; cursor: zoom-in; display: block; }
.ann-actions { display: flex; justify-content: flex-end; margin-top: 8px; }
.hw-card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
.hw-subject { font-size: 12px; color: #38bdf8; font-weight: bold; margin-bottom: 4px; }
.hw-text    { font-size: 13px; color: #cbd5e1; line-height: 1.5; }
.hw-meta    { font-size: 11px; color: #475569; margin-top: 6px; }
.hw-due     { font-size: 12px; color: #fbbf24; margin-top: 3px; }
.img-preview { max-height: 90px; border-radius: 8px; margin-top: 6px; display: none; object-fit: cover; border: 1px solid #334155; }
.grade-card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
.grade-card-title { font-size: 13px; font-weight: bold; color: #38bdf8; margin-bottom: 10px; }
.grade-subjects-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.grade-subject-item { background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 6px 12px; font-size: 13px; }
.empty { text-align: center; color: #475569; font-size: 14px; padding: 32px 0; }
.counter { font-size: 12px; color: #6b7280; margin-bottom: 10px; }
.skeleton { background: linear-gradient(90deg, #1f2937 25%, #2d3748 50%, #1f2937 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; height: 64px; margin: 8px 0; }
@keyframes shimmer { 0% { background-position:200% 0; } 100% { background-position:-200% 0; } }
.toast { position: fixed; bottom: 78px; left: 50%; transform: translateX(-50%); background: #1f2937; border: 1px solid #334155; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300; display: none; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 24px; width: 280px; text-align: center; }
.modal h3 { margin-bottom: 10px; font-size: 16px; }
.modal p  { color: #9ca3af; font-size: 13px; margin-bottom: 20px; }
.modal-btns { display: flex; gap: 10px; }
.modal-btns button { flex: 1; }
.lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 500; display: none; align-items: center; justify-content: center; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 95vw; max-height: 90vh; border-radius: 10px; }
.fade-in { animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; } }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">⚡ لوحة الادمن</div>
  <button class="logout-btn" onclick="window.logout()">🚪 خروج</button>
</div>

<!-- OVERVIEW -->
<div id="overview" class="section active">
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num" id="statTotal">—</div><div class="stat-label">إجمالي</div></div>
    <div class="stat-card"><div class="stat-num" id="statStudents">—</div><div class="stat-label">طلاب</div></div>
    <div class="stat-card"><div class="stat-num" id="statTeachers">—</div><div class="stat-label">مدرسين</div></div>
    <div class="stat-card"><div class="stat-num" id="statAdmins">—</div><div class="stat-label">ادمن</div></div>
  </div>
  <div class="card">
    <div class="card-title">📢 إعلان سريع</div>
    <div class="field"><label>العنوان</label><input type="text" id="quickTitle" placeholder="عنوان الإعلان"></div>
    <div class="field"><label>النص</label><textarea id="quickText" placeholder="نص الإعلان..."></textarea></div>
    <div class="field">
      <label>صورة (اختياري)</label>
      <div class="input-row">
        <button class="btn-icon" onclick="document.getElementById('quickImgFile').click()">📷</button>
        <span id="quickImgName" style="font-size:12px;color:#6b7280;flex:1"></span>
        <input type="file" id="quickImgFile" accept="image/*" style="display:none">
      </div>
      <img id="quickImgPreview" class="img-preview">
    </div>
    <div class="field"><label>الموجه إلى</label>
      <select id="quickTarget">
        <option value="">📣 كل الصفوف</option>
        <option value="__teachers__">👩‍🏫 المدرسين فقط</option>
        <optgroup label="الصف السابع"><option>7A</option><option>7B</option><option>7C</option></optgroup>
        <optgroup label="الصف الثامن"><option>8A</option><option>8B</option><option>8C</option></optgroup>
        <optgroup label="الصف التاسع"><option>9A</option><option>9B</option><option>9C</option></optgroup>
        <optgroup label="الصف العاشر"><option>10A</option><option>10B</option><option>10C</option></optgroup>
        <optgroup label="الصف الحادي عشر"><option>11A</option><option>11B</option><option>11C</option></optgroup>
        <optgroup label="الصف الثاني عشر"><option>12A</option><option>12B</option><option>12C</option></optgroup>
      </select>
    </div>
    <button class="btn btn-primary" onclick="window.postAnnouncement('quick')">📤 نشر الإعلان</button>
  </div>
</div>

<!-- USERS -->
<div id="users" class="section">
  <div class="card">
    <div class="card-title">➕ إنشاء مستخدم</div>
    <div class="field"><label>الدور</label>
      <select id="newRole" onchange="window.onRoleChange()">
        <option value="student">طالب</option>
        <option value="teacher">مدرس</option>
        <option value="admin">ادمن</option>
      </select>
    </div>
    <div class="form-row">
      <div class="field"><label>الاسم الظاهر</label><input type="text" id="newDisplayName" placeholder="الاسم الكامل"></div>
      <div class="field"><label>اسم المستخدم</label><input type="text" id="newUsername" placeholder="username"></div>
    </div>
    <div class="form-row">
      <div class="field"><label>كلمة المرور</label><input type="text" id="newPassword" placeholder="••••••"></div>
      <div class="field">
        <label>الصورة</label>
        <div class="input-row">
          <input type="text" id="newPfp" placeholder="https://..." oninput="window.liveNewPfp(this.value)">
          <button class="btn-icon" onclick="document.getElementById('newPfpFile').click()">📷</button>
          <input type="file" id="newPfpFile" accept="image/*" style="display:none">
        </div>
        <img id="newPfpPreview" class="img-preview" style="width:48px;height:48px;border-radius:50%;object-fit:cover">
      </div>
    </div>
    <div class="field student-only" id="studentClassField">
      <label>الصف</label>
      <select id="newClass">
        <option value="">— اختر الصف —</option>
        <optgroup label="الصف السابع"><option>7A</option><option>7B</option><option>7C</option></optgroup>
        <optgroup label="الصف الثامن"><option>8A</option><option>8B</option><option>8C</option></optgroup>
        <optgroup label="الصف التاسع"><option>9A</option><option>9B</option><option>9C</option></optgroup>
        <optgroup label="الصف العاشر"><option>10A</option><option>10B</option><option>10C</option></optgroup>
        <optgroup label="الصف الحادي عشر"><option>11A</option><option>11B</option><option>11C</option></optgroup>
        <optgroup label="الصف الثاني عشر"><option>12A</option><option>12B</option><option>12C</option></optgroup>
      </select>
    </div>
    <div class="teacher-only" id="teacherFields">
      <div class="field"><label>الصفوف المسندة</label><div class="tags-wrap" id="teacherClassTags"></div></div>
      <div class="field" style="margin-top:6px"><label>المواد</label><div class="tags-wrap" id="teacherSubjectTags"></div></div>
    </div>
    <button class="btn btn-primary" onclick="window.createUser()" style="margin-top:12px">إنشاء المستخدم</button>
  </div>
  <div class="search-bar">
    <input type="text" id="search" placeholder="🔍 بحث...">
    <select id="classFilter">
      <option value="">كل الصفوف</option>
      <optgroup label="الصف السابع"><option>7A</option><option>7B</option><option>7C</option></optgroup>
      <optgroup label="الصف الثامن"><option>8A</option><option>8B</option><option>8C</option></optgroup>
      <optgroup label="الصف التاسع"><option>9A</option><option>9B</option><option>9C</option></optgroup>
      <optgroup label="الصف العاشر"><option>10A</option><option>10B</option><option>10C</option></optgroup>
      <optgroup label="الصف الحادي عشر"><option>11A</option><option>11B</option><option>11C</option></optgroup>
      <optgroup label="الصف الثاني عشر"><option>12A</option><option>12B</option><option>12C</option></optgroup>
    </select>
  </div>
  <div class="counter" id="counter"></div>
  <div id="usersList"><div class="skeleton"></div><div class="skeleton" style="height:52px;width:85%"></div></div>
</div>

<!-- ANNOUNCEMENTS -->
<div id="announcements" class="section">
  <div class="card">
    <div class="card-title">📢 إعلان جديد</div>
    <div class="field"><label>العنوان</label><input type="text" id="annTitle" placeholder="عنوان الإعلان"></div>
    <div class="field"><label>النص</label><textarea id="annText" placeholder="نص الإعلان..."></textarea></div>
    <div class="field">
      <label>صورة (اختياري)</label>
      <div class="input-row">
        <button class="btn-icon" onclick="document.getElementById('annImgFile').click()">📷</button>
        <span id="annImgName" style="font-size:12px;color:#6b7280;flex:1"></span>
        <input type="file" id="annImgFile" accept="image/*" style="display:none">
      </div>
      <img id="annImgPreview" class="img-preview">
    </div>
    <div class="field"><label>الموجه إلى</label>
      <select id="annTarget">
        <option value="">📣 كل الصفوف</option>
        <option value="__teachers__">👩‍🏫 المدرسين فقط</option>
        <optgroup label="الصف السابع"><option>7A</option><option>7B</option><option>7C</option></optgroup>
        <optgroup label="الصف الثامن"><option>8A</option><option>8B</option><option>8C</option></optgroup>
        <optgroup label="الصف التاسع"><option>9A</option><option>9B</option><option>9C</option></optgroup>
        <optgroup label="الصف العاشر"><option>10A</option><option>10B</option><option>10C</option></optgroup>
        <optgroup label="الصف الحادي عشر"><option>11A</option><option>11B</option><option>11C</option></optgroup>
        <optgroup label="الصف الثاني عشر"><option>12A</option><option>12B</option><option>12C</option></optgroup>
      </select>
    </div>
    <button class="btn btn-primary" onclick="window.postAnnouncement('main')">📤 نشر</button>
  </div>
  <div class="search-bar">
    <select id="annFilterTarget" onchange="window.filterAnnouncements()">
      <option value="">كل الإعلانات</option>
      <option value="__global__">للكل فقط</option>
      <option value="__teachers__">👩‍🏫 للمدرسين</option>
      <optgroup label="الصف السابع"><option>7A</option><option>7B</option><option>7C</option></optgroup>
      <optgroup label="الصف الثامن"><option>8A</option><option>8B</option><option>8C</option></optgroup>
      <optgroup label="الصف التاسع"><option>9A</option><option>9B</option><option>9C</option></optgroup>
      <optgroup label="الصف العاشر"><option>10A</option><option>10B</option><option>10C</option></optgroup>
      <optgroup label="الصف الحادي عشر"><option>11A</option><option>11B</option><option>11C</option></optgroup>
      <optgroup label="الصف الثاني عشر"><option>12A</option><option>12B</option><option>12C</option></optgroup>
    </select>
  </div>
  <div class="card-title" style="padding:0 2px 8px">الإعلانات المنشورة</div>
  <div id="annList"><div class="skeleton" style="height:80px"></div><div class="skeleton" style="height:60px;width:80%"></div></div>
</div>

<!-- HOMEWORK -->
<div id="homework" class="section">
  <div class="card">
    <div class="card-title">📚 نشر واجب</div>
    <div class="form-row">
      <div class="field"><label>الصف</label>
        <select id="hwClass">
          <option value="">— الصف —</option>
          <optgroup label="الصف السابع"><option>7A</option><option>7B</option><option>7C</option></optgroup>
          <optgroup label="الصف الثامن"><option>8A</option><option>8B</option><option>8C</option></optgroup>
          <optgroup label="الصف التاسع"><option>9A</option><option>9B</option><option>9C</option></optgroup>
          <optgroup label="الصف العاشر"><option>10A</option><option>10B</option><option>10C</option></optgroup>
          <optgroup label="الصف الحادي عشر"><option>11A</option><option>11B</option><option>11C</option></optgroup>
          <optgroup label="الصف الثاني عشر"><option>12A</option><option>12B</option><option>12C</option></optgroup>
        </select>
      </div>
      <div class="field"><label>المادة</label>
        <select id="hwSubject">
          <option value="">— المادة —</option>
          <option>التربية الاسلامية</option><option>اللغة العربية</option>
          <option>اللغة الانجليزية</option><option>اللغة الفرنسية</option>
          <option>اللغة الكردية</option><option>جرائم حزب البعث</option>
          <option>الرياضيات</option><option>الفيزياء</option>
          <option>الكيمياء</option><option>الاحياء</option><option>الحاسوب</option>
          <option>التربية الفنية</option><option>التربية الأخلاقية</option><option>الاجتماعيات</option>
        </select>
      </div>
    </div>
    <div class="field"><label>نص الواجب</label><textarea id="hwText" placeholder="اكتب الواجب هنا..."></textarea></div>
    <div class="field"><label>الموعد النهائي (اختياري)</label><input type="text" id="hwDue" placeholder="مثال: الأحد 15/6"></div>
    <button class="btn btn-primary" onclick="window.postHomework()">📤 نشر الواجب</button>
  </div>
  <div class="search-bar">
    <select id="hwViewClass" onchange="window.loadHomework()">
      <option value="">— اختر الصف —</option>
      <optgroup label="الصف السابع"><option>7A</option><option>7B</option><option>7C</option></optgroup>
      <optgroup label="الصف الثامن"><option>8A</option><option>8B</option><option>8C</option></optgroup>
      <optgroup label="الصف التاسع"><option>9A</option><option>9B</option><option>9C</option></optgroup>
      <optgroup label="الصف العاشر"><option>10A</option><option>10B</option><option>10C</option></optgroup>
      <optgroup label="الصف الحادي عشر"><option>11A</option><option>11B</option><option>11C</option></optgroup>
      <optgroup label="الصف الثاني عشر"><option>12A</option><option>12B</option><option>12C</option></optgroup>
    </select>
    <select id="hwViewSubject" onchange="window.loadHomework()">
      <option value="">— كل المواد —</option>
      <option>التربية الاسلامية</option><option>اللغة العربية</option>

/* ── IMGBB ── */
const IMGBB_KEY = "cca338527e12b39b9ec8e64f7128782a";
async function uploadImgbb(file) {
  const base64 = await new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(",")[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
  const form = new FormData();
  form.append("key", IMGBB_KEY); form.append("image", base64);
  const res  = await fetch("https://api.imgbb.com/1/upload", { method:"POST", body:form });
  const json = await res.json();
  if (!json.success) throw new Error(json.error?.message || "فشل الرفع");
  return json.data.url;
}

["quickTitle","quickText","annTitle","annText"].forEach(id => { const el=document.getElementById(id); if(el) el.value=""; });
["quickTarget","annTarget"].forEach(id => { const el=document.getElementById(id); if(el) el.value=""; });

const snap=await getDocs(collection(db,"gradeSubjects"));
if (snap.empty) { box.innerHTML=<div class="empty">لا توجد بيانات</div>; return; }
const entries=[];
snap.forEach(d=>entries.push({grade:d.id,subjects:d.data().subjects||[]}));
entries.sort((a,b)=>a.grade.localeCompare(b.grade,undefined,{numeric:true}));
box.innerHTML="";
entries.forEach(({grade,subjects})=>{
const card=document.createElement("div");
card.className="grade-card fade-in";
card.innerHTML=<div class="grade-card-title">📘 الصف ${sanitize(grade)}</div><div class="grade-subjects-grid">${subjects.length?subjects.map(s=>${sanitize(s)}).join(""):لا توجد مواد}</div>;
box.appendChild(card);
});
}
/* ── LOGOUT ── */
window.logout = () => { localStorage.removeItem("user"); location.href="index.html"; };
loadUsers();
