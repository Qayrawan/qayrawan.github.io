<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    input, select {
      margin: 5px;
      padding: 5px;
    }

    button {
      margin: 5px;
      padding: 6px 10px;
      cursor: pointer;
    }

    .user {
      border: 1px solid #ccc;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <h2>🧑‍💼 Admin Panel</h2>

  <h3>Create User</h3>

  <input id="username" placeholder="Username">
  <input id="password" placeholder="Password">
  <input id="class" placeholder="Class">

  <select id="role">
    <option value="student">Student</option>
    <option value="teacher">Teacher</option>
    <option value="admin">Admin</option>
  </select>

  <br>
  <button onclick="createUser()">Create User</button>

  <h3>All Users</h3>
  <div id="usersList"></div>

  <button onclick="logout()">Logout</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } 
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD3vUPTVJoa3-CUvscE9rq4gGOg-SAko2k",
      authDomain: "qayrawan-school-system.firebaseapp.com",
      projectId: "qayrawan-school-system",
      storageBucket: "qayrawan-school-system.firebasestorage.app",
      messagingSenderId: "785321248181",
      appId: "1:785321248181:web:643e6d29cdca556218c5fc"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 🛡️ PROTECTION
    const user = JSON.parse(localStorage.getItem("user"));

    if (!user || user.role !== "admin") {
      window.location.href = "login.html";
    }

    // ➕ CREATE USER
    window.createUser = async function () {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const role = document.getElementById("role").value;
      const userClass = document.getElementById("class").value;

      if (!username || !password) {
        alert("Fill all required fields");
        return;
      }

      await addDoc(collection(db, "users"), {
        username: username,
        password: password,
        role: role,
        class: userClass
      });

      alert("User created!");
      loadUsers();
    };

    // 📋 LOAD USERS
    async function loadUsers() {
      const usersList = document.getElementById("usersList");
      usersList.innerHTML = "";

      const snapshot = await getDocs(collection(db, "users"));

      snapshot.forEach(docSnap => {
        const data = docSnap.data();

        const div = document.createElement("div");
        div.className = "user";

        div.innerHTML = `
          <b>${data.username}</b> (${data.role}) - Class: ${data.class || "-"}
          <br>
          <button onclick="deleteUser('${docSnap.id}')">Delete</button>
        `;

        usersList.appendChild(div);
      });
    }

    // 🗑️ DELETE USER
    window.deleteUser = async function (id) {
      await deleteDoc(doc(db, "users", id));
      loadUsers();
    };

    // 🚪 LOGOUT
    window.logout = function () {
      localStorage.removeItem("user");
      window.location.href = "index.html";
    };

    // 🚀 INITIAL LOAD
    loadUsers();
  </script>

</body>
</html>
