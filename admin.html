<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      margin: 0;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #43a047;
    }

    .user {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    img {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      object-fit: cover;
    }

    .actions button {
      width: auto;
      margin: 3px;
      padding: 6px 10px;
    }

    @media (max-width: 600px) {
      .user {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>

<div class="container">

<h2>🧑‍💼 Admin Panel</h2>

<div class="card">
  <h3>Create User</h3>

  <input id="displayName" placeholder="Display Name">
  <input id="username" placeholder="Username">
  <input id="password" placeholder="Password">
  <input id="pfp" placeholder="Profile Picture URL">

  <select id="class">
    <option value="">Select Class</option>
    <option>9A</option>
    <option>9B</option>
    <option>10A</option>
    <option>10B</option>
  </select>

  <select id="role">
    <option value="student">Student</option>
    <option value="teacher">Teacher</option>
    <option value="admin">Admin</option>
  </select>

  <button onclick="createUser()">Create User</button>
</div>

<div class="card">
  <h3>All Users</h3>
  <div id="usersList"></div>
</div>

<button onclick="logout()">Logout</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD3vUPTVJoa3-CUvscE9rq4gGOg-SAko2k",
  authDomain: "qayrawan-school-system.firebaseapp.com",
  projectId: "qayrawan-school-system",
  storageBucket: "qayrawan-school-system.firebasestorage.app",
  messagingSenderId: "785321248181",
  appId: "1:785321248181:web:643e6d29cdca556218c5fc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🛡️ PROTECTION
const user = JSON.parse(localStorage.getItem("user"));
if (!user || user.role !== "admin") {
  window.location.href = "index.html";
}

// ➕ CREATE USER
window.createUser = async function () {
  const displayName = document.getElementById("displayName").value;
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const role = document.getElementById("role").value;
  const userClass = document.getElementById("class").value;
  const pfp = document.getElementById("pfp").value;

  if (!username || !password || !displayName) {
    alert("Fill required fields");
    return;
  }

  await addDoc(collection(db, "users"), {
    displayName,
    username,
    password,
    role,
    class: userClass,
    pfp
  });

  loadUsers();
};

// 📋 LOAD USERS
async function loadUsers() {
  const usersList = document.getElementById("usersList");
  usersList.innerHTML = "";

  const snapshot = await getDocs(collection(db, "users"));

  snapshot.forEach(docSnap => {
    const data = docSnap.data();

    const div = document.createElement("div");
    div.className = "user card";

    div.innerHTML = `
      <div class="user-info">
        <img src="${data.pfp || 'https://via.placeholder.com/45'}">
        <div>
          <b>${data.displayName}</b><br>
          <small>@${data.username}</small><br>
          <small>${data.role} | ${data.class || "-"}</small>
        </div>
      </div>

      <div class="actions">
        <button onclick="editUser('${docSnap.id}')">Edit</button>
        <button onclick="deleteUser('${docSnap.id}')">Delete</button>
      </div>
    `;

    usersList.appendChild(div);
  });
}

// ✏️ EDIT USER
window.editUser = async function (id) {
  const displayName = prompt("Display Name:");
  const username = prompt("Username:");
  const password = prompt("Password:");
  const userClass = prompt("Class:");
  const role = prompt("Role:");
  const pfp = prompt("Profile Picture URL:");

  await updateDoc(doc(db, "users", id), {
    displayName,
    username,
    password,
    class: userClass,
    role,
    pfp
  });

  loadUsers();
};

// 🗑️ DELETE USER
window.deleteUser = async function (id) {
  await deleteDoc(doc(db, "users", id));
  loadUsers();
};

// 🚪 LOGOUT
window.logout = function () {
  localStorage.removeItem("user");
  window.location.href = "index.html";
};

// INIT
loadUsers();
</script>

</body>
</html>
