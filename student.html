<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student App</title>

<style>
:root{
  --bg:#0b1220;
  --panel:#111827;
  --panel2:#1f2937;
  --line:#243042;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#38bdf8;
  --radius:16px;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

/* TOPBAR */
.topbar{
  height:58px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 14px;
  background:rgba(17,24,39,.95);
  border-bottom:1px solid var(--line);
}

.icon-btn{
  width:38px;
  height:38px;
  display:grid;
  place-items:center;
  border-radius:10px;
  cursor:pointer;
}

.icon-btn:hover{
  background:rgba(255,255,255,.05);
}

/* PROFILE ICON */
.avatar{
  width:36px;
  height:36px;
  border-radius:50%;
  background:#1f2937;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:18px;
}

/* DRAWER */
.drawer{
  position:fixed;
  top:0;
  right:-260px;
  width:240px;
  height:100%;
  background:linear-gradient(#111827,#0f172a);
  border-left:1px solid var(--line);
  padding:16px;
  transition:.2s;
}

.drawer.open{
  right:0;
}

.menu-btn{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:var(--panel2);
  color:white;
  cursor:pointer;
}

/* CONTENT */
.container{
  padding:16px;
}

.page{
  display:none;
}

.page.active{
  display:block;
}

/* CARDS */
.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  margin-top:10px;
}

.small{
  color:var(--muted);
  font-size:.9rem;
}

/* PROFILE PANEL */
.profile-panel{
  position:fixed;
  top:70px;
  left:12px;
  right:12px;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:16px;
  padding:16px;
  display:none;
}

.profile-panel.show{
  display:block;
}

.profile-head{
  display:flex;
  align-items:center;
  gap:12px;
}

.big-avatar{
  width:50px;
  height:50px;
  border-radius:50%;
  background:var(--panel2);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
}

/* HOMEWORK */
.hw{
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#0b1322;
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="icon-btn" onclick="toggleDrawer()">☰</div>
  <div>📚 التطبيق</div>
  <div class="avatar" onclick="toggleProfile()">👤</div>
</div>

<!-- DRAWER -->
<div id="drawer" class="drawer">
  <button class="menu-btn" onclick="go('home')">🏠 الرئيسية</button>
  <button class="menu-btn" onclick="go('announcements')">📢 الإعلانات</button>
  <button class="menu-btn" onclick="go('homework')">📚 الواجبات</button>
</div>

<!-- PROFILE -->
<div id="profile" class="profile-panel">
  <div class="profile-head">
    <div class="big-avatar">👤</div>
    <div>
      <div id="pName"></div>
      <div class="small">@<span id="pUser"></span></div>
    </div>
  </div>
  <div class="small" style="margin-top:10px;">
    الصف: <span id="pClass"></span>
  </div>
</div>

<!-- CONTENT -->
<div class="container">

  <div id="home" class="page active">
    <h3>🏠 الرئيسية</h3>
    <div class="card small">أهلاً بك 👋</div>
  </div>

  <div id="announcements" class="page">
    <h3>📢 الإعلانات</h3>
    <div class="card small">لا توجد إعلانات حالياً</div>
  </div>

  <div id="homework" class="page">
    <h3>📚 واجباتك</h3>
    <div id="hwBox"></div>
  </div>

</div>

<script>

/* USER */
const user = {
  name:"منتظر",
  username:"montadar",
  class:"4A"
};

/* HOMEWORK */
const hwData = [
  {title:"رياضيات", desc:"حل صفحة 32", class:"4A"},
  {title:"فيزياء", desc:"اقرأ الفصل الأول", class:"4A"},
  {title:"إنشاء", desc:"موضوع تعبير", class:"4B"}
];

/* INIT */
function init(){
  document.getElementById("pName").textContent = user.name;
  document.getElementById("pUser").textContent = user.username;
  document.getElementById("pClass").textContent = user.class;
  renderHW();
}

/* HOMEWORK FILTER */
function renderHW(){
  const box = document.getElementById("hwBox");
  box.innerHTML = "";

  const list = hwData.filter(h => h.class === user.class);

  if(list.length === 0){
    box.innerHTML = `<div class="card small">لا يوجد واجبات 🎉</div>`;
    return;
  }

  list.forEach(h=>{
    box.innerHTML += `
      <div class="hw">
        <b>${h.title}</b>
        <div class="small">${h.desc}</div>
      </div>
    `;
  });
}

/* NAV */
function go(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById(p).classList.add("active");
  toggleDrawer(false);
}

/* UI */
function toggleDrawer(force){
  const d = document.getElementById("drawer");
  if(force===false){ d.classList.remove("open"); return; }
  d.classList.toggle("open");
}

function toggleProfile(){
  document.getElementById("profile").classList.toggle("show");
}

/* START */
init();

</script>

</body>
</html>
