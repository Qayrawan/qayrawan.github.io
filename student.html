<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة الطالب</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; font-family: Arial; }

body {
  margin: 0;
  background: #0f172a;
  color: white;
  overflow: hidden;
}

/* TOP BAR */
.topbar {
  height: 60px;
  background: #111827;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  border-bottom: 1px solid #1f2937;
}

.menuBtn { font-size: 26px; cursor: pointer; }
.title { font-weight: bold; }

.pfp {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: #374151;
  overflow: hidden;
  cursor: pointer;
}
.pfp img { width: 100%; height: 100%; object-fit: cover; }

/* SIDE MENU */
.menu {
  position: fixed;
  top: 0;
  right: -260px;
  width: 260px;
  height: 100%;
  background: #111827;
  transition: 0.3s;
  padding-top: 60px;
  border-left: 1px solid #1f2937;
  z-index: 10;
}
.menu.open { right: 0; }

.menu div {
  padding: 15px;
  border-bottom: 1px solid #1f2937;
  cursor: pointer;
}

/* MAIN CONTENT */
.page {
  display: none;
  height: calc(100vh - 60px);
  overflow-y: auto;
  padding: 12px;
}
.page.active { display: block; }

/* CARDS */
.card {
  background: #1f2937;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
}

/* CHAT */
.chatBox {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  gap: 8px;
  padding: 10px;
  background: #111827;
}
.chatBox input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #1f2937;
  color: white;
}
.chatBox button {
  padding: 10px;
  background: #2563eb;
  border: none;
  color: white;
  border-radius: 8px;
}

/* PROFILE */
.profile {
  position: fixed;
  top: 70px;
  right: 10px;
  width: 230px;
  background: #111827;
  border: 1px solid #1f2937;
  border-radius: 10px;
  padding: 12px;
  display: none;
}
.profile img {
  width: 60px;
  height: 60px;
  border-radius: 50%;
}

/* MESSAGES */
.msg {
  background: #1f2937;
  padding: 8px;
  margin: 5px 0;
  border-radius: 8px;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="menuBtn" onclick="toggleMenu()">≡</div>
  <div class="title">لوحة الطالب</div>
  <div class="pfp" onclick="toggleProfile()" id="pfpBox"></div>
</div>

<!-- MENU -->
<div class="menu" id="menu">
  <div onclick="openPage('home')">🏠 الرئيسية</div>
  <div onclick="openPage('ann')">📢 الإعلانات</div>
  <div onclick="openPage('hw')">📚 الواجبات</div>
  <div onclick="logout()">🚪 تسجيل خروج</div>
</div>

<!-- HOME -->
<div class="page active" id="home">
  <div class="card">👋 أهلاً بك في النظام</div>
</div>

<!-- ANNOUNCEMENTS -->
<div class="page" id="ann">
  <div class="card">📢 لا توجد إعلانات حالياً</div>
</div>

<!-- HOMEWORK -->
<div class="page" id="hw">
  <h3>📚 واجباتك</h3>
  <div id="hwList"></div>
</div>

<!-- CHAT -->
<div id="messages" class="page"></div>

<div class="chatBox">
  <input id="input" placeholder="اكتب رسالة..." />
  <button onclick="send()">إرسال</button>
</div>

<!-- PROFILE -->
<div class="profile" id="profile"></div>

<script>
let user;

/* 🔐 LOGIN */
window.onload = () => {
  user = JSON.parse(localStorage.getItem("user"));
  if (!user) location.href = "index.html";

  loadProfile();
  loadHomework();
};

/* 👤 PROFILE */
function loadProfile() {
  document.getElementById("pfpBox").innerHTML =
    `<img src="${user.pfp || 'placeholder.png'}">`;
}

function toggleProfile() {
  const p = document.getElementById("profile");
  p.innerHTML = `
    <img src="${user.pfp || 'placeholder.png'}">
    <h4>${user.name}</h4>
    <p>@${user.username}</p>
    <p>الصف: ${user.class}</p>
  `;
  p.style.display = p.style.display === "block" ? "none" : "block";
}

/* 📚 HOMEWORK FILTER (CLASS ONLY 🔥) */
function loadHomework() {
  const all = JSON.parse(localStorage.getItem("homework")) || [];
  const filtered = all.filter(hw => hw.class === user.class);

  const box = document.getElementById("hwList");
  box.innerHTML = "";

  filtered.forEach(hw => {
    box.innerHTML += `
      <div class="card">
        <b>${hw.subject}</b><br>
        ${hw.text}
      </div>
    `;
  });

  if (filtered.length === 0) {
    box.innerHTML = `<div class="card">لا يوجد واجبات</div>`;
  }
}

/* ☰ MENU */
function toggleMenu() {
  document.getElementById("menu").classList.toggle("open");
}

/* 📄 NAVIGATION */
function openPage(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  toggleMenu();
}

/* 💬 CHAT */
function send() {
  const input = document.getElementById("input");
  if (!input.value) return;

  const div = document.createElement("div");
  div.className = "msg";
  div.innerText = input.value;

  document.getElementById("messages").appendChild(div);
  input.value = "";
}

/* 🚪 LOGOUT */
function logout() {
  localStorage.removeItem("user");
  location.href = "index.html";
}
</script>

</body>
</html>
