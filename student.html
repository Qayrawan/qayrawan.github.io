<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة الطالب</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* TOPBAR */
.topbar{
  height:60px;
  background:#111827;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 12px;
  border-bottom:1px solid #1f2937;
}

.menuBtn{font-size:24px;cursor:pointer;}
.title{font-weight:bold;}

.pfp{
  width:38px;height:38px;border-radius:50%;
  overflow:hidden;background:#374151;cursor:pointer;
}
.pfp img{width:100%;height:100%;object-fit:cover;}

/* MENU */
.menu{
  position:fixed;
  right:-260px;
  top:0;
  width:260px;
  height:100%;
  background:#111827;
  transition:.25s;
  padding-top:60px;
  z-index:10;
}
.menu.open{right:0;}
.menu div{
  padding:15px;
  border-bottom:1px solid #1f2937;
  cursor:pointer;
}
.menu div:hover{background:#1f2937;}

/* SECTIONS */
.section{
  display:none;
  padding:12px;
  height:calc(100vh - 60px);
  overflow:auto;
}
.active{display:block;}

/* HOME */
.home-card{
  background:#1f2937;
  padding:14px;
  border-radius:12px;
}

/* HOMEWORK */
.subject{
  background:#1f2937;
  margin:10px 0;
  border-radius:10px;
  overflow:hidden;
}

.subject-header{
  padding:12px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
}

.subject-body{
  display:none;
  padding:10px;
  border-top:1px solid #374151;
  color:#9ca3af;
}

.subject.open .subject-body{display:block;}

/* CHAT */
.messages{
  height:75%;
  overflow:auto;
  padding-bottom:10px;
}

.msg{
  background:#1f2937;
  padding:8px 10px;
  margin:6px 0;
  border-radius:10px;
  max-width:75%;
}

.msg b{color:#38bdf8;}

.inputBox{
  display:flex;
  gap:8px;
}

input{
  flex:1;
  padding:10px;
  background:#1f2937;
  border:none;
  color:white;
  border-radius:8px;
}

button{
  padding:10px;
  background:#2563eb;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* PROFILE */
.profile{
  position:fixed;
  top:70px;
  right:10px;
  background:#111827;
  padding:12px;
  border-radius:12px;
  display:none;
  z-index:20;
  width:220px;
}
.profile img{
  width:60px;height:60px;border-radius:50%;
}

/* ANIMATION */
.fade{
  animation:fade .2s ease;
}
@keyframes fade{
  from{opacity:0;transform:translateY(6px);}
  to{opacity:1;}
}
</style>
</head>

<body>

<div class="topbar">
  <div class="menuBtn" onclick="toggleMenu()">≡</div>
  <div class="title">لوحة الطالب</div>
  <div class="pfp" onclick="toggleProfile()" id="pfpBox"></div>
</div>

<div class="menu" id="menu">
  <div onclick="openSection('home')">🏠 الرئيسية</div>
  <div onclick="openSection('homework')">📚 الواجبات</div>
  <div onclick="openSection('chat')">💬 الدردشة</div>
  <div onclick="logout()">🚪 تسجيل خروج</div>
</div>

<!-- HOME -->
<div id="home" class="section active fade">
  <div class="home-card">
    <h3>👋 أهلاً ${""}</h3>
    <p style="color:#9ca3af">تابع واجباتك وتواصل مع زملائك بسهولة</p>
  </div>
</div>

<!-- HOMEWORK -->
<div id="homework" class="section fade"></div>

<!-- CHAT -->
<div id="chat" class="section fade">
  <div class="messages" id="messages"></div>
  <div class="inputBox">
    <input id="msgInput" placeholder="اكتب رسالة...">
    <button onclick="sendMsg()">إرسال</button>
  </div>
</div>

<!-- PROFILE -->
<div class="profile" id="profile"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
  apiKey:"AIzaSyD3vUPTVJoa3-CUvscE9rq4gGOg-SAko2k",
  authDomain:"qayrawan-school-system.firebaseapp.com",
  projectId:"qayrawan-school-system"
});
const db = getFirestore(app);

/* USER */
let user = JSON.parse(localStorage.getItem("user"));
if(!user) location.href="index.html";

/* PROFILE */
document.getElementById("pfpBox").innerHTML =
`<img src="${user.pfp || 'placeholder.png'}">`;

function toggleProfile(){
  const p = document.getElementById("profile");
  p.innerHTML = `
    <img src="${user.pfp || 'placeholder.png'}">
    <h4>${user.name}</h4>
    <p>@${user.username}</p>
    <p>${user.class}</p>
  `;
  p.style.display = p.style.display=="block"?"none":"block";
}

/* MENU */
window.toggleMenu=()=>{
  document.getElementById("menu").classList.toggle("open");
};

window.openSection=(id)=>{
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  toggleMenu();
};

/* HOMEWORK */
const subjects=[
"التربية الاسلامية","اللغة العربية","اللغة الانجليزية",
"الاحياء","الكيمياء","الفيزياء","الرياضيات",
"جرائم حزب البعث","اللغة الفرنسية","التربية الفنية","الحاسوب"
];

const hwDiv=document.getElementById("homework");

subjects.forEach(sub=>{
  const div=document.createElement("div");
  div.className="subject";
  div.innerHTML=`
    <div class="subject-header">${sub} ⬅️</div>
    <div class="subject-body">لا يوجد واجب حالياً</div>
  `;
  div.onclick=()=>div.classList.toggle("open");
  hwDiv.appendChild(div);
});

/* CHAT */
const ref=collection(db,"classes",user.class,"messages");

window.sendMsg=async ()=>{
  const input=document.getElementById("msgInput");
  if(!input.value) return;

  await addDoc(ref,{
    text:input.value,
    name:user.name,
    time:Date.now()
  });

  input.value="";
};

const q=query(ref,orderBy("time"));

onSnapshot(q,snap=>{
  const box=document.getElementById("messages");
  box.innerHTML="";

  snap.forEach(doc=>{
    const m=doc.data();
    const div=document.createElement("div");
    div.className="msg fade";
    div.innerHTML=`<b>${m.name}</b><br>${m.text}`;
    box.appendChild(div);
  });

  box.scrollTop=box.scrollHeight;
});

/* LOGOUT */
window.logout=()=>{
  localStorage.removeItem("user");
  location.href="index.html";
};
</script>

</body>
</html>
