<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة القيروان</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b1220;
  color:#e5e7eb;
}

/* TOP BAR */
.topbar{
  height:55px;
  background:#111827;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 12px;
  border-bottom:1px solid #243042;
}

.icon{
  font-size:22px;
  cursor:pointer;
}

.profile{
  width:34px;
  height:34px;
  border-radius:50%;
  background:#1f2937;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  right:-220px;
  width:200px;
  height:100%;
  background:#111827;
  border-left:1px solid #243042;
  padding:12px;
  transition:.2s;
}

.sidebar.open{
  right:0;
}

.sidebar button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1f2937;
  color:#fff;
  cursor:pointer;
}

/* CONTENT */
.container{
  padding:16px;
}

.page{
  display:none;
}

.page.active{
  display:block;
}

/* CARDS */
.card{
  background:#111827;
  border:1px solid #243042;
  border-radius:12px;
  padding:12px;
  margin-top:10px;
}

.small{
  color:#9ca3af;
  font-size:.85rem;
}

/* PROFILE PANEL */
.profileBox{
  position:fixed;
  top:60px;
  left:10px;
  right:10px;
  background:#111827;
  border:1px solid #243042;
  border-radius:12px;
  padding:12px;
  display:none;
}

.profileBox.show{
  display:block;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="icon" onclick="toggleSidebar()">☰</div>
  <div>📚 تطبيق الطالب</div>
  <div class="profile" onclick="toggleProfile()">👤</div>
</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <button onclick="go('home')">🏠 الرئيسية</button>
  <button onclick="go('announcements')">📢 الإعلانات</button>
  <button onclick="go('homework')">📚 الواجبات</button>
</div>

<!-- PROFILE -->
<div id="profileBox" class="profileBox">
  <div><b id="pName"></b></div>
  <div class="small">Username: <span id="pUser"></span></div>
  <div class="small">Class: <span id="pClass"></span></div>
</div>

<!-- CONTENT -->
<div class="container">

  <!-- HOME -->
  <div id="home" class="page active">
    <h3>🏠 الرئيسية</h3>
    <p class="small">مرحباً بك 👋</p>
  </div>

  <!-- ANNOUNCEMENTS -->
  <div id="announcements" class="page">
    <h3>📢 الإعلانات</h3>
    <div class="card small">لا توجد إعلانات حالياً</div>
  </div>

  <!-- HOMEWORK -->
  <div id="homework" class="page">
    <h3>📚 واجباتك</h3>
    <div id="homeworkBox"></div>
  </div>

</div>

<script>

/* =========================
   USERS (LOGIN SYSTEM)
========================= */
const users = [
  {
    name: "منتظر",
    username: "montadar",
    class: "4A"
  }
];

let currentUser = null;

/* =========================
   HOMEWORK DATA
========================= */
const homeworkData = [
  { title:"رياضيات", desc:"حل صفحة 32", class:"4A" },
  { title:"فيزياء", desc:"اقرأ الفصل الأول", class:"4A" },
  { title:"إنشاء", desc:"موضوع تعبير", class:"4B" }
];

/* =========================
   LOGIN (AUTO FOR NOW)
========================= */
function login(username){
  const user = users.find(u => u.username === username);
  if(!user) return;

  currentUser = user;
  init();
}

/* =========================
   INIT APP
========================= */
function init(){
  updateProfile();
  renderHomework();
}

/* =========================
   PROFILE
========================= */
function updateProfile(){
  document.getElementById("pName").textContent = currentUser.name;
  document.getElementById("pUser").textContent = currentUser.username;
  document.getElementById("pClass").textContent = currentUser.class;
}

/* =========================
   HOMEWORK FILTER
========================= */
function renderHomework(){
  const box = document.getElementById("homeworkBox");
  box.innerHTML = "";

  const filtered = homeworkData.filter(h => h.class === currentUser.class);

  if(filtered.length === 0){
    box.innerHTML = `<div class="card">لا يوجد واجبات 🎉</div>`;
    return;
  }

  filtered.forEach(h=>{
    box.innerHTML += `
      <div class="card">
        <b>${h.title}</b>
        <div class="small">${h.desc}</div>
      </div>
    `;
  });
}

/* =========================
   NAVIGATION
========================= */
function go(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
  toggleSidebar(false);
}

/* =========================
   UI TOGGLES
========================= */
function toggleSidebar(force){
  const s = document.getElementById("sidebar");
  if(force === false) return s.classList.remove("open");
  s.classList.toggle("open");
}

function toggleProfile(){
  document.getElementById("profileBox").classList.toggle("show");
}

/* =========================
   START APP
========================= */
window.onload = () => {
  login("montadar"); // demo auto-login
};

</script>

</body>
</html>
