<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة الطالب</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: monospace;
      background: #0f172a;
      color: #e2e8f0;
    }

    header {
      background: #1e293b;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #334155;
    }

    header h2 {
      margin: 0;
      font-size: 18px;
    }

    .logout {
      background: #ef4444;
      border: none;
      padding: 8px 12px;
      color: white;
      cursor: pointer;
      border-radius: 6px;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    .card h3 {
      margin-top: 0;
      font-size: 16px;
      margin-bottom: 10px;
    }

    .homework {
      margin-bottom: 10px;
      padding: 10px;
      background: #334155;
      border-radius: 8px;
    }

    .submit-box {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    textarea {
      flex: 1;
      resize: none;
      padding: 8px;
      border-radius: 8px;
      border: none;
      outline: none;
      background: #0f172a;
      color: white;
    }

    .icon-btn {
      background: #475569;
      border: none;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      color: white;
    }

    .send-btn {
      background: #22c55e;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      color: white;
    }

    .settings {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .settings button {
      background: #475569;
      border: none;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      color: white;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: url("placeholder.png");
      background-size: cover;
    }

  </style>
</head>
<body>

<header>
  <div style="display:flex; align-items:center; gap:10px;">
    <div class="avatar"></div>
    <h2 id="studentName">طالب</h2>
  </div>
  <button class="logout" onclick="logout()">تسجيل خروج</button>
</header>

<div class="container">

  <!-- 📚 Homework Section -->
  <div class="card">
    <h3>📚 الواجبات</h3>

    <div id="homeworkList"></div>

    <!-- Submit -->
    <div class="submit-box">
      <textarea id="hwInput" rows="2" placeholder="اكتب الحل..."></textarea>
      <button class="icon-btn" title="إرفاق">+</button>
      <button class="icon-btn" title="تسجيل صوتي">🎤</button>
      <button class="send-btn" onclick="submitHW()">إرسال</button>
    </div>
  </div>

  <!-- 📊 Grades -->
  <div class="card">
    <h3>📊 الدرجات</h3>
    <p id="grades">لا توجد بيانات حالياً</p>
  </div>

  <!-- ⚙️ Settings -->
  <div class="card">
    <h3>⚙️ الإعدادات</h3>
    <div class="settings">
      <button onclick="toggleDark()">تبديل الوضع</button>
      <button onclick="changeName()">تغيير الاسم</button>
      <button onclick="clearHW()">مسح الواجبات</button>
    </div>
  </div>

</div>

<script>
  // 🔐 Check login
  const user = localStorage.getItem("student");

  if (!user) {
    location.href = "index.html";
  } else {
    document.getElementById("studentName").innerText = user;
  }

  // 📚 Load Homework
  function loadHW() {
    const list = document.getElementById("homeworkList");
    list.innerHTML = "";

    const data = JSON.parse(localStorage.getItem("hw") || "[]");

    data.forEach((hw, i) => {
      const div = document.createElement("div");
      div.className = "homework";
      div.innerText = hw;
      list.appendChild(div);
    });
  }

  loadHW();

  // ✍️ Submit Homework
  function submitHW() {
    const input = document.getElementById("hwInput");
    if (input.value.trim() === "") return;

    let data = JSON.parse(localStorage.getItem("hw") || "[]");
    data.push(input.value);
    localStorage.setItem("hw", JSON.stringify(data));

    input.value = "";
    loadHW();
  }

  // ⚙️ Settings
  function toggleDark() {
    document.body.style.background =
      document.body.style.background === "white" ? "#0f172a" : "white";
  }

  function changeName() {
    let newName = prompt("ادخل الاسم الجديد:");
    if (newName) {
      localStorage.setItem("student", newName);
      document.getElementById("studentName").innerText = newName;
    }
  }

  function clearHW() {
    localStorage.removeItem("hw");
    loadHW();
  }
</script>

</body>
</html>
