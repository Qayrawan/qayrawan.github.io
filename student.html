<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة الطالب</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  padding-bottom: 70px;
}

/* ── TOPBAR ── */
.topbar {
  height: 60px;
  background: #111827;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 16px;
  border-bottom: 1px solid #1f2937;
  position: sticky;
  top: 0;
  z-index: 50;
}

.title { font-weight: bold; font-size: 17px; }

.pfp {
  width: 38px; height: 38px; border-radius: 50%;
  overflow: hidden; background: #374151; cursor: pointer;
  border: 2px solid #374151;
  transition: border-color 0.2s;
  flex-shrink: 0;
}
.pfp:hover { border-color: #38bdf8; }
.pfp img { width: 100%; height: 100%; object-fit: cover; }

/* ── PROFILE MINI BAR ── */
.profile {
  position: fixed;
  top: 68px;
  left: 12px;
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 12px;
  padding: 14px 16px;
  display: none;
  z-index: 200;
  min-width: 200px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  animation: fadeDown 0.15s ease;
}

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.profile-name  { font-size: 15px; font-weight: bold; margin-bottom: 4px; }
.profile-user  { color: #94a3b8; font-size: 13px; margin-bottom: 4px; }
.profile-class { color: #38bdf8; font-size: 13px; margin-bottom: 12px; }
.profile-logout {
  background: #ef4444; border: none; color: white;
  padding: 8px 14px; border-radius: 8px; cursor: pointer;
  width: 100%; font-size: 13px; transition: background 0.2s;
}
.profile-logout:hover { background: #dc2626; }

/* ── BOTTOM NAV ── */
.bottomnav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 64px;
  background: #111827;
  border-top: 1px solid #1f2937;
  display: flex;
  z-index: 50;
}

.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer; position: relative;
  font-size: 11px; color: #6b7280; gap: 3px;
  transition: color 0.2s;
  user-select: none;
}
.nav-item .icon { font-size: 22px; line-height: 1; }
.nav-item.active { color: #38bdf8; }
.nav-item:hover  { color: #cbd5e1; }

.badge {
  position: absolute; top: 6px; left: 50%; margin-left: 4px;
  background: #ef4444; color: white; font-size: 10px; font-weight: bold;
  border-radius: 10px; padding: 1px 5px; min-width: 16px;
  text-align: center; display: none;
}

/* ── SECTIONS ── */
.section {
  display: none;
  padding: 12px;
  min-height: calc(100vh - 60px - 64px);
}
.active { display: block; }

/* ── HOME ── */
.home-card {
  background: #1f2937; padding: 16px;
  border-radius: 14px; margin-bottom: 12px;
}
.home-card h3 { margin: 0 0 6px; font-size: 18px; }
.home-card p  { margin: 0; color: #9ca3af; font-size: 14px; }

.home-stats {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-top: 12px;
}
.stat-card {
  background: #1f2937; border-radius: 12px;
  padding: 14px; text-align: center;
}
.stat-card .stat-num   { font-size: 28px; font-weight: bold; color: #38bdf8; }
.stat-card .stat-label { font-size: 12px; color: #9ca3af; margin-top: 4px; }

/* ── HOMEWORK ── */
.subject {
  background: #1f2937; margin: 10px 0;
  border-radius: 12px; overflow: hidden;
}
.subject-header {
  padding: 14px; cursor: pointer;
  display: flex; justify-content: space-between; align-items: center;
  user-select: none;
}
.subject-header .arrow {
  transition: transform 0.2s; font-size: 12px; color: #6b7280;
}
.subject.open .subject-header .arrow { transform: rotate(90deg); }

.subject-body {
  display: none; padding: 12px;
  border-top: 1px solid #374151;
}
.subject.open .subject-body { display: block; }

.subject-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
.tab-btn {
  padding: 6px 12px; border-radius: 8px; border: none;
  cursor: pointer; font-size: 13px; background: #374151;
  color: #9ca3af; transition: 0.2s;
}
.tab-btn.active { background: #1d4ed8; color: white; }

.tab-content { display: none; }
.tab-content.active { display: block; }

.teacher-msg {
  background: #0f172a;
  border-right: 3px solid #38bdf8;
  padding: 9px 12px; border-radius: 0 8px 8px 0;
  margin: 6px 0; font-size: 14px; line-height: 1.5;
}
.due-date { font-size: 12px; color: #fbbf24; margin-top: 4px; }

/* ── CHAT ── */
.chat-container {
  display: flex; flex-direction: column;
  height: calc(100vh - 60px - 64px - 24px);
}

.messages {
  flex: 1; overflow-y: auto;
  padding: 4px 0 6px;
  display: flex; flex-direction: column; gap: 4px;
}

.msg {
  max-width: 78%; padding: 9px 12px;
  border-radius: 14px; word-break: break-word;
  font-size: 14px; line-height: 1.4;
}
.msg.mine {
  background: #1d4ed8;
  border-radius: 14px 14px 2px 14px;
  align-self: flex-start;
}
.msg.theirs {
  background: #1f2937;
  border-radius: 14px 14px 14px 2px;
  align-self: flex-end;
}
.msg .sender {
  font-size: 11px; color: #38bdf8;
  margin-bottom: 3px; font-weight: bold;
}
.msg .time {
  font-size: 10px; color: #475569; margin-top: 3px;
}

.typing-indicator {
  font-size: 12px; color: #6b7280;
  padding: 2px 4px; min-height: 18px;
  font-style: italic;
}

.chat-input-bar { display: flex; gap: 8px; padding-top: 8px; }

input[type=text] {
  flex: 1; padding: 11px 14px;
  background: #1f2937; border: 1px solid #374151;
  color: white; border-radius: 10px; font-size: 14px;
  outline: none; transition: border-color 0.2s;
  font-family: Arial;
}
input[type=text]:focus { border-color: #38bdf8; }

.send-btn {
  padding: 11px 16px; background: #2563eb; border: none;
  color: white; border-radius: 10px; cursor: pointer;
  font-size: 16px; transition: background 0.2s; flex-shrink: 0;
}
.send-btn:hover { background: #1d4ed8; }

/* ── SKELETON ── */
.skeleton {
  background: linear-gradient(90deg, #1f2937 25%, #2d3748 50%, #1f2937 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 8px; height: 42px; margin: 8px 0;
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ── ANIMATIONS ── */
.fade-in { animation: fadeIn 0.2s ease; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="title">لوحة الطالب</div>
  <div class="pfp" onclick="window.toggleProfile()" id="pfpBox">
    <img src="placeholder.png" alt="pfp">
  </div>
</div>

<!-- PROFILE MINI BAR -->
<div class="profile" id="profile">
  <div class="profile-name"  id="pName"></div>
  <div class="profile-user"  id="pUser"></div>
  <div class="profile-class" id="pClass"></div>
  <button class="profile-logout" onclick="window.logout()">🚪 تسجيل خروج</button>
</div>

<!-- HOME -->
<div id="home" class="section active">
  <div class="home-card">
    <h3 id="homeGreeting">👋 أهلاً</h3>
    <p>تابع واجباتك وتواصل مع زملائك بسهولة</p>
  </div>
  <div class="home-stats">
    <div class="stat-card">
      <div class="stat-num">11</div>
      <div class="stat-label">المواد</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statMsgs">—</div>
      <div class="stat-label">رسائل الفصل</div>
    </div>
  </div>
</div>

<!-- HOMEWORK -->
<div id="homework" class="section"></div>

<!-- CHAT -->
<div id="chat" class="section">
  <div class="chat-container">
    <div class="messages" id="messages">
      <div class="skeleton"></div>
      <div class="skeleton" style="width:55%"></div>
      <div class="skeleton" style="width:70%"></div>
    </div>
    <div class="typing-indicator" id="typingIndicator"></div>
    <div class="chat-input-bar">
      <input type="text" id="msgInput" placeholder="اكتب رسالة...">
      <button class="send-btn" onclick="window.sendMsg()">➤</button>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottomnav">
  <div class="nav-item active" id="nav-home" onclick="window.openSection('home')">
    <span class="icon">🏠</span><span>الرئيسية</span>
  </div>
  <div class="nav-item" id="nav-homework" onclick="window.openSection('homework')">
    <span class="icon">📚</span><span>الواجبات</span>
    <span class="badge" id="hwBadge"></span>
  </div>
  <div class="nav-item" id="nav-chat" onclick="window.openSection('chat')">
    <span class="icon">💬</span><span>الدردشة</span>
    <span class="badge" id="chatBadge"></span>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, onSnapshot,
  query, orderBy, doc, setDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ─── FIREBASE ─── */
const app = initializeApp({
  apiKey:      "AIzaSyD3vUPTVJoa3-CUvscE9rq4gGOg-SAko2k",
  authDomain:  "qayrawan-school-system.firebaseapp.com",
  projectId:   "qayrawan-school-system"
});
const db = getFirestore(app);

/* ─── USER ─── */
const user = JSON.parse(localStorage.getItem("user"));
if (!user) location.href = "index.html";
// Add this safety line:
if (!user.name) user.name = user.displayName
if (!user.displayName) user.displayName = user.displayName
/* ─── HELPERS ─── */
function sanitize(str) {
  const d = document.createElement("div");
  d.textContent = str ?? "";
  return d.innerHTML;
}

function formatTime(ts) {
  const d = new Date(ts);
  return d.getHours().toString().padStart(2,"0") + ":" +
         d.getMinutes().toString().padStart(2,"0");
}

function updateBadge(id, count) {
  const b = document.getElementById(id);
  if (!b) return;
  if (count > 0) {
    b.textContent = count > 99 ? "99+" : count;
    b.style.display = "inline";
  } else {
    b.style.display = "none";
  }
}

/* ─── PROFILE ─── */
document.getElementById("pfpBox").innerHTML =
  `<img src="${sanitize(user.pfp || "placeholder.png")}" alt="pfp">`;

document.getElementById("homeGreeting").textContent = `👋 أهلاً ${user.displayName}`;
document.getElementById("pName").textContent  = user.displayName;
document.getElementById("pUser").textContent  = `@${user.username}`;
document.getElementById("pClass").textContent = user.class;

window.toggleProfile = () => {
  const p = document.getElementById("profile");
  p.style.display = p.style.display === "block" ? "none" : "block";
};

document.addEventListener("click", e => {
  if (!e.target.closest(".pfp") && !e.target.closest("#profile")) {
    document.getElementById("profile").style.display = "none";
  }
});

/* ─── NAVIGATION ─── */
window.openSection = (id) => {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
  document.getElementById(`nav-${id}`)?.classList.add("active");

  if (id === "chat") {
    localStorage.setItem("lastSeenChat", Date.now().toString());
    updateBadge("chatBadge", 0);
  }
  if (id === "homework") {
    localStorage.setItem("lastSeenHw", Date.now().toString());
    updateBadge("hwBadge", 0);
  }
};

/* ─── HOMEWORK ─── */
const subjects = [
  "التربية الاسلامية","اللغة العربية","اللغة الانجليزية",
  "الاحياء","الكيمياء","الفيزياء","الرياضيات",
  "جرائم حزب البعث","اللغة الفرنسية","التربية الفنية","الحاسوب"
];

const hwDiv = document.getElementById("homework");

subjects.forEach((sub, idx) => {
  const id = `sub_${idx}`;

  const div = document.createElement("div");
  div.className = "subject";

  div.innerHTML = `
    <div class="subject-header">
      <span>${sanitize(sub)}</span>
      <span class="arrow">▶</span>
    </div>
    <div class="subject-body">
      <div class="subject-tabs">
        <button class="tab-btn active" data-tab="${id}_hw">📢 واجبات</button>
        <button class="tab-btn"        data-tab="${id}_disc">💬 نقاش</button>
      </div>

      <!-- Teacher posts tab -->
      <div class="tab-content active" id="${id}_hw">
        <div class="skeleton"></div>
      </div>

      <!-- Student discussion tab -->
      <div class="tab-content" id="${id}_disc">
        <div id="${id}_discMsgs"
             style="max-height:200px;overflow-y:auto;
                    display:flex;flex-direction:column;gap:4px;
                    margin-bottom:8px;padding:4px 0;">
          <p style="color:#6b7280;font-size:12px;text-align:center;margin:8px 0">
            لا توجد رسائل بعد
          </p>
        </div>
        <div style="display:flex;gap:6px">
          <input type="text" id="${id}_input"
                 placeholder="ناقش مع زملائك..."
                 style="flex:1;padding:8px 10px;background:#0f172a;
                        border:1px solid #374151;color:white;
                        border-radius:8px;font-size:13px;
                        outline:none;font-family:Arial;">
          <button data-idx="${idx}"
                  style="padding:8px 14px;background:#2563eb;border:none;
                         color:white;border-radius:8px;cursor:pointer;
                         font-size:13px;">
            إرسال
          </button>
        </div>
      </div>
    </div>
  `;

  /* Accordion toggle (header only) */
  div.querySelector(".subject-header").addEventListener("click", () => {
    div.classList.toggle("open");
  });

  /* Tab switching */
  div.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      const target = btn.dataset.tab;
      div.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      div.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById(target).classList.add("active");
    });
  });

  /* Discussion send button */
  div.querySelector("button[data-idx]").addEventListener("click", async e => {
    e.stopPropagation();
    const input = document.getElementById(`${id}_input`);
    if (!input.value.trim()) return;
    const ref = collection(db, "classes", user.class, "homework", sub, "discussion");
    await addDoc(ref, {
      text:     input.value.trim(),
      name:     user.name,
      username: user.username,
      class:    user.class,
      time:     Date.now()
    });
    input.value = "";
  });

  /* Discussion send on Enter */
  div.querySelector(`#${id}_input`).addEventListener("keydown", async e => {
    if (e.key !== "Enter") return;
    e.stopPropagation();
    const input = document.getElementById(`${id}_input`);
    if (!input.value.trim()) return;
    const ref = collection(db, "classes", user.class, "homework", sub, "discussion");
    await addDoc(ref, {
      text:     input.value.trim(),
      name:     user.name,
      username: user.username,
      class:    user.class,
      time:     Date.now()
    });
    input.value = "";
  });

  /* Teacher messages listener */
  const teacherRef = collection(db, "classes", user.class, "homework", sub, "messages");
  onSnapshot(query(teacherRef, orderBy("time")), snap => {
    const box = document.getElementById(`${id}_hw`);
    const lastSeen = parseInt(localStorage.getItem("lastSeenHw") || "0");
    const hwActive = document.getElementById("homework").classList.contains("active");

    if (snap.empty) {
      box.innerHTML = `<p style="color:#6b7280;font-size:13px;margin:8px 0">لا يوجد واجب حالياً</p>`;
      return;
    }

    box.innerHTML = "";
    let newCount = 0;

    snap.forEach(d => {
      const m = d.data();
      if (!hwActive && m.time > lastSeen) newCount++;

      const el = document.createElement("div");
      el.className = "teacher-msg fade-in";
      el.innerHTML = `
        ${sanitize(m.text)}
        ${m.due ? `<div class="due-date">⏳ الموعد: ${sanitize(m.due)}</div>` : ""}
        <div style="font-size:11px;color:#475569;margin-top:4px">${formatTime(m.time)}</div>
      `;
      box.appendChild(el);
    });

    if (newCount > 0) {
      const prev = parseInt(document.getElementById("hwBadge").textContent || "0");
      updateBadge("hwBadge", prev + newCount);
    }
  });

  /* Discussion listener */
  const discRef = collection(db, "classes", user.class, "homework", sub, "discussion");
  onSnapshot(query(discRef, orderBy("time")), snap => {
    const box = document.getElementById(`${id}_discMsgs`);
    if (!box) return;

    if (snap.empty) {
      box.innerHTML = `<p style="color:#6b7280;font-size:12px;text-align:center;margin:8px 0">لا توجد رسائل بعد</p>`;
      return;
    }

    box.innerHTML = "";
    snap.forEach(d => {
      const m = d.data();
      const isMe = m.username === user.username;
      const el = document.createElement("div");
      el.style.cssText = `
        max-width:80%;padding:7px 10px;border-radius:10px;
        background:${isMe ? "#1d4ed8" : "#1f2937"};font-size:13px;
        align-self:${isMe ? "flex-start" : "flex-end"};
      `;
      el.innerHTML = `
        ${!isMe ? `<div style="font-size:11px;color:#38bdf8;margin-bottom:2px;font-weight:bold">${sanitize(m.name)}</div>` : ""}
        ${sanitize(m.text)}
        <div style="font-size:10px;color:#475569;margin-top:2px">${formatTime(m.time)}</div>
      `;
      box.appendChild(el);
    });
    box.scrollTop = box.scrollHeight;
  });

  hwDiv.appendChild(div);
});

/* ─── CHAT ─── */
const chatRef   = collection(db, "classes", user.class, "messages");
const chatQuery = query(chatRef, orderBy("time"));
let chatReady   = false;

onSnapshot(chatQuery, snap => {
  const box       = document.getElementById("messages");
  const chatActive= document.getElementById("chat").classList.contains("active");
  const lastSeen  = parseInt(localStorage.getItem("lastSeenChat") || "0");

  if (!chatReady) {
    box.innerHTML = "";
    chatReady = true;
  }

  box.innerHTML = "";
  let unread = 0;

  snap.forEach(d => {
    const m    = d.data();
    const isMe = m.username
      ? m.username === user.username
      : (m.name === user.name && m.class === user.class);

    if (!chatActive && !isMe && m.time > lastSeen) unread++;

    const el = document.createElement("div");
    el.className = `msg fade-in ${isMe ? "mine" : "theirs"}`;
    el.innerHTML = `
      ${!isMe ? `<div class="sender">${sanitize(m.name)} · ${sanitize(m.class)}</div>` : ""}
      ${sanitize(m.text)}
      <div class="time">${formatTime(m.time)}</div>
    `;
    box.appendChild(el);
  });

  if (!chatActive && unread > 0) updateBadge("chatBadge", unread);
  box.scrollTop = box.scrollHeight;

  document.getElementById("statMsgs").textContent = snap.size;
});

window.sendMsg = async () => {
  const input = document.getElementById("msgInput");
  if (!input.value.trim()) return;

  await addDoc(chatRef, {
    text:     input.value.trim(),
    name:     user.name,
    username: user.username,
    class:    user.class,
    time:     Date.now()
  });

  input.value = "";
  clearTimeout(typingTimeout);
  try { await deleteDoc(doc(db, "classes", user.class, "typing", user.username)); } catch {}
};

document.getElementById("msgInput").addEventListener("keydown", e => {
  if (e.key === "Enter") window.sendMsg();
});

/* ─── TYPING INDICATOR ─── */
let typingTimeout;

document.getElementById("msgInput").addEventListener("input", async () => {
  try {
    await setDoc(doc(db, "classes", user.class, "typing", user.username), {
      name: user.name,
      ts:   Date.now()
    });
  } catch {}

  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(async () => {
    try { await deleteDoc(doc(db, "classes", user.class, "typing", user.username)); } catch {}
  }, 2500);
});

onSnapshot(collection(db, "classes", user.class, "typing"), snap => {
  const now    = Date.now();
  const typers = [];

  snap.forEach(d => {
    const data = d.data();
    if (d.id !== user.username && now - data.ts < 4000) {
      typers.push(sanitize(data.name));
    }
  });

  document.getElementById("typingIndicator").textContent =
    typers.length === 0 ? "" :
    typers.length === 1 ? `${typers[0]} يكتب...` :
    `${typers.join("، ")} يكتبون...`;
});

/* ─── LOGOUT ─── */
window.logout = () => {
  localStorage.removeItem("user");
  location.href = "index.html";
};
</script>
</body>
</html>
