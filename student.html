<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة الطالب</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #38bdf8;
  --accent-btn: #2563eb;
  --accent-btn-hover: #1d4ed8;
  --font-size: 14px;
  --bubble-radius: 14px;
  --bg: #0f172a;
  --surface: #1f2937;
  --surface2: #111827;
}

body {
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: white;
  overflow-x: hidden;
}

/* ── TOPBAR ── */
.topbar {
  height: 60px;
  background: var(--surface2);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 16px;
  border-bottom: 1px solid #1f2937;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50;
}
.title { font-weight: bold; font-size: 17px; }

.pfp {
  width: 38px; height: 38px; border-radius: 50%;
  overflow: hidden; background: #374151; cursor: pointer;
  border: 2px solid #374151; transition: border-color 0.2s; flex-shrink: 0;
}
.pfp:hover { border-color: var(--accent); }
.pfp img { width: 100%; height: 100%; object-fit: cover; }

/* ── PROFILE DROPDOWN ── */
.profile {
  position: fixed;
  top: 68px; left: 12px;
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 16px;
  display: none;
  z-index: 200;
  min-width: 220px;
  box-shadow: 0 12px 32px rgba(0,0,0,0.6);
  overflow: hidden;
  animation: fadeDown 0.15s ease;
}
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.profile-header {
  display: flex; align-items: center; gap: 12px;
  padding: 16px;
  background: #0f172a;
  border-bottom: 1px solid #334155;
}
.profile-avatar {
  width: 46px; height: 46px; border-radius: 50%;
  object-fit: cover; border: 2px solid var(--accent); flex-shrink: 0;
}
.profile-name  { font-size: 14px; font-weight: bold; }
.profile-user  { color: #94a3b8; font-size: 12px; margin-top: 2px; }
.profile-class {
  color: var(--accent); font-size: 11px; font-weight: bold;
  background: #1e3a5f; display: inline-block;
  padding: 2px 8px; border-radius: 20px; margin-top: 5px;
}
.profile-logout {
  background: none; border: none; color: #ef4444;
  padding: 13px 16px; cursor: pointer; width: 100%;
  text-align: right; font-size: 13px; font-family: Arial;
  display: flex; align-items: center; gap: 8px;
  transition: background 0.2s;
}
.profile-logout:hover { background: #1f2937; }

/* ── BOTTOM NAV ── */
.bottomnav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 64px;
  background: var(--surface2);
  border-top: 1px solid #1f2937;
  display: flex;
  z-index: 50;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer; position: relative;
  font-size: 11px; color: #6b7280; gap: 3px;
  transition: color 0.2s; user-select: none;
}
.nav-item .icon { font-size: 22px; line-height: 1; }
.nav-item.active { color: var(--accent); }
.nav-item:hover  { color: #cbd5e1; }
.badge {
  position: absolute; top: 6px; left: 50%; margin-left: 6px;
  background: #ef4444; color: white; font-size: 10px; font-weight: bold;
  border-radius: 10px; padding: 1px 5px; min-width: 16px;
  text-align: center; display: none;
}

/* ── SECTIONS ── */
.section {
  display: none;
  position: fixed;
  top: 60px; left: 0; right: 0; bottom: 64px;
  overflow-y: auto;
  padding: 12px;
  -webkit-overflow-scrolling: touch;
}
.section.active { display: block; }

#chat {
  display: none;
  flex-direction: column;
  overflow: hidden;
  padding: 12px;
}
#chat.active { display: flex; }

/* ── HOME ── */
.home-card {
  background: var(--surface);
  padding: 18px;
  border-radius: 16px;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
}
.home-card h3    { font-size: 19px; margin-bottom: 3px; }
.home-card .sub  { color: #9ca3af; font-size: 12px; margin-bottom: 10px; }
.home-date {
  font-size: 11px; color: #475569;
  background: #0f172a; display: inline-block;
  padding: 3px 10px; border-radius: 20px;
}

.section-label {
  font-size: 11px; color: #6b7280;
  margin: 16px 0 8px; text-transform: uppercase;
  letter-spacing: 0.06em;
  display: flex; align-items: center; gap: 6px;
}
.section-label::after {
  content: ""; flex: 1; height: 1px; background: #1f2937;
}

/* ── ANNOUNCEMENTS ── */
.announcement {
  background: var(--surface);
  border-right: 3px solid var(--accent);
  border-radius: 0 14px 14px 0;
  padding: 14px 16px;
  margin-bottom: 10px;
  font-size: var(--font-size);
  line-height: 1.6;
  animation: fadeIn 0.2s ease;
  position: relative;
}
.ann-title { font-weight: bold; color: var(--accent); font-size: 14px; margin-bottom: 5px; }
.ann-meta  { font-size: 11px; color: #475569; margin-top: 8px; }

/* ── SUBJECT LIST ── */
.subject-item {
  background: var(--surface);
  margin: 8px 0; border-radius: 14px;
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 14px 16px; cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  user-select: none;
  border: 1px solid transparent;
}
.subject-item:hover  { background: #263244; border-color: #334155; }
.subject-item:active { transform: scale(0.98); }
.subject-left  { display: flex; align-items: center; gap: 12px; }
.sub-icon      { font-size: 22px; line-height: 1; }
.sub-name      { font-size: 14px; font-weight: bold; }
.sub-arrow     { color: #6b7280; font-size: 12px; }

/* ── SUBJECT SCREEN ── */
.subject-screen {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg);
  z-index: 100;
  transform: translateX(-100%);
  transition: transform 0.28s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column;
}
.subject-screen.open { transform: translateX(0); }

.subject-topbar {
  height: 60px;
  background: var(--surface2);
  display: flex; align-items: center;
  padding: 0 14px;
  border-bottom: 1px solid #1f2937;
  flex-shrink: 0; gap: 12px;
}
.back-btn {
  background: none; border: none; color: var(--accent);
  font-size: 22px; cursor: pointer; padding: 0; line-height: 1; flex-shrink: 0;
}
.subject-topbar-title { font-weight: bold; font-size: 16px; flex: 1; }

.tab-panel {
  flex: 1; overflow-y: auto;
  padding: 12px;
}

.teacher-post {
  background: var(--surface);
  border-right: 3px solid var(--accent);
  padding: 14px 16px;
  border-radius: 0 12px 12px 0;
  margin-bottom: 12px;
  font-size: var(--font-size);
  line-height: 1.6;
}

/* ── CHAT ── */
.messages {
  flex: 1; overflow-y: auto;
  display: flex; flex-direction: column;
  gap: 3px; padding-bottom: 6px;
}
.msg {
  max-width: 80%; padding: 9px 13px;
  word-break: break-word;
  font-size: var(--font-size);
}
.msg.mine {
  background: var(--accent-btn);
  border-radius: var(--bubble-radius) var(--bubble-radius) 2px var(--bubble-radius);
  align-self: flex-start;
}
.msg.theirs {
  background: var(--surface);
  border-radius: var(--bubble-radius) var(--bubble-radius) var(--bubble-radius) 2px;
  align-self: flex-end;
}
.msg-sender { font-size: 11px; color: var(--accent); margin-bottom: 4px; font-weight: bold; }
.msg-time   { font-size: 10px; color: #475569; margin-top: 3px; }

.chat-input-bar { display: flex; gap: 8px; padding-top: 8px; }
input[type=text] {
  flex: 1; padding: 11px 14px;
  background: var(--surface); border: 1px solid #374151;
  color: white; border-radius: 12px; outline: none;
}
.send-btn {
  width: 46px; height: 46px;
  background: var(--accent-btn); border: none;
  color: white; border-radius: 12px; cursor: pointer;
}

/* ── SETTINGS ── */
.settings-group { background: var(--surface); border-radius: 16px; margin-bottom: 14px; overflow: hidden; }
.settings-group-title { font-size: 11px; color: #6b7280; padding: 12px 16px 6px; text-transform: uppercase; }
.setting-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-top: 1px solid #374151; font-size: 14px; }

.fade-in { animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="topbar">
  <div class="title">لوحة الطالب</div>
  <div class="pfp" onclick="window.toggleProfile()" id="pfpBox">
    <img src="placeholder.png" alt="pfp">
  </div>
</div>

<div class="profile" id="profile">
  <div class="profile-header">
    <img class="profile-avatar" id="profileAvatar" src="placeholder.png" alt="pfp">
    <div>
      <div class="profile-name"  id="pName">Student</div>
      <div class="profile-user"  id="pUser"></div>
      <div class="profile-class" id="pClass"></div>
    </div>
  </div>
  <button class="profile-logout" onclick="window.logout()">🚪 تسجيل خروج</button>
</div>

<div id="home" class="section active">
  <div class="home-card">
    <h3 id="homeGreeting">👋 أهلاً</h3>
    <p class="sub">تابع واجباتك وتواصل مع زملائك</p>
    <div class="home-date" id="homeDate"></div>
  </div>
  <div class="section-label">📢 إعلانات الإدارة</div>
  <div id="announcementsList"></div>
</div>

<div id="homework" class="section">
  <div class="section-label" style="margin-top:4px">📚 المواد الدراسية</div>
  <div id="subjectList"></div>
</div>

<div id="chat" class="section">
  <div class="messages" id="messages"></div>
  <div class="typing-indicator" id="typingIndicator"></div>
  <div class="chat-input-bar">
    <input type="text" id="msgInput" placeholder="اكتب رسالة...">
    <button class="send-btn" onclick="window.sendMsg()">➤</button>
  </div>
</div>

<div id="settings" class="section">
  <div class="settings-group">
    <div class="settings-group-title">⚙️ الإعدادات العامة</div>
    <div class="setting-row"><span>نظام القيروان المدرسي · v1.0</span></div>
  </div>
</div>

<div class="subject-screen" id="subjectScreen">
  <div class="subject-topbar">
    <button class="back-btn" onclick="window.closeSubject()">◀</button>
    <div class="subject-topbar-title" id="subjectScreenTitle"></div>
  </div>
  <div class="tab-panel" id="panelPosts"></div>
</div>

<div class="bottomnav">
  <div class="nav-item active" id="nav-home" onclick="window.openSection('home')">🏠<span>الرئيسية</span></div>
  <div class="nav-item" id="nav-homework" onclick="window.openSection('homework')">📚<span>الواجبات</span></div>
  <div class="nav-item" id="nav-chat" onclick="window.openSection('chat')">💬<span>الدردشة</span></div>
  <div class="nav-item" id="nav-settings" onclick="window.openSection('settings')">⚙️<span>الإعدادات</span></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyD3vUPTVJoa3-CUvscE9rq4gGOg-SAko2k",
  authDomain: "qayrawan-school-system.firebaseapp.com",
  projectId: "qayrawan-school-system"
});
const db = getFirestore(app);

const raw = JSON.parse(localStorage.getItem("user"));
if (!raw) location.href = "index.html";

const user = {
  name: raw.displayName || raw.name || "Student",
  username: raw.username || "unknown",
  class: raw.class || "—",
  pfp: raw.pfp || ""
};

/* ── FIX 1: GET DISPLAY NAME FROM FIRESTORE ── */
async function syncDisplayName() {
  const userRef = doc(db, "students", user.username);
  const snap = await getDoc(userRef);
  if (snap.exists() && snap.data().displayName) {
    const dName = snap.data().displayName;
    document.getElementById("pName").textContent = dName;
    document.getElementById("homeGreeting").textContent = `👋 أهلاً ${dName}`;
  } else {
    document.getElementById("pName").textContent = user.name;
    document.getElementById("homeGreeting").textContent = `👋 أهلاً ${user.name}`;
  }
}
syncDisplayName();

/* ── FIX 2: SUBJECT ORDER ── */
const subjects = [
  { name: "الاسلامية", icon: "☪️" },
  { name: "العربية", icon: "📖" },
  { name: "الانكليزية", icon: "🔤" },
  { name: "الفرنسية", icon: "🥐" },
  { name: "الكردية", icon: "☀️" },
  { name: "جرائم البعث", icon: "📜" },
  { name: "الرياضيات", icon: "📐" },
  { name: "الفيزياء", icon: "⚡" },
  { name: "الكيمياء", icon: "⚗️" },
  { name: "الاحياء", icon: "🧬" },
  { name: "الحاسوب", icon: "💻" }
];

const subjectList = document.getElementById("subjectList");
subjects.forEach(({ name, icon }) => {
  const el = document.createElement("div");
  el.className = "subject-item";
  el.innerHTML = `<div class="subject-left"><span class="sub-icon">${icon}</span><span class="sub-name">${name}</span></div><span class="sub-arrow">◀</span>`;
  el.onclick = () => window.openSubject(name);
  subjectList.appendChild(el);
});

/* ── UI LOGIC ── */
document.getElementById("homeDate").textContent = new Date().toLocaleDateString("ar-IQ", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
document.getElementById("profileAvatar").src = user.pfp || "placeholder.png";
document.getElementById("pUser").textContent = `@${user.username}`;
document.getElementById("pClass").textContent = user.class;

window.toggleProfile = () => {
  const p = document.getElementById("profile");
  p.style.display = p.style.display === "block" ? "none" : "block";
};

window.openSection = (id) => {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
  document.getElementById(`nav-${id}`).classList.add("active");
};

window.openSubject = (sub) => {
  document.getElementById("subjectScreenTitle").textContent = sub;
  document.getElementById("subjectScreen").classList.add("open");
  const panel = document.getElementById("panelPosts");
  panel.innerHTML = "جاري التحميل...";
  onSnapshot(query(collection(db, "classes", user.class, "homework", sub, "messages"), orderBy("time")), snap => {
    panel.innerHTML = snap.empty ? "لا يوجد واجبات" : "";
    snap.forEach(d => {
      const m = d.data();
      panel.innerHTML += `<div class="teacher-post"><div>${m.text}</div><div style="font-size:10px; color:#6b7280; margin-top:5px">${new Date(m.time).toLocaleTimeString()}</div></div>`;
    });
  });
};

window.closeSubject = () => document.getElementById("subjectScreen").classList.remove("open");

window.logout = () => { localStorage.removeItem("user"); location.href = "index.html"; };

/* ── CHAT LOGIC ── */
const chatRef = collection(db, "classes", user.class, "messages");
onSnapshot(query(chatRef, orderBy("time")), snap => {
  const box = document.getElementById("messages");
  box.innerHTML = "";
  snap.forEach(d => {
    const m = d.data();
    const isMe = m.username === user.username;
    box.innerHTML += `<div class="msg ${isMe ? 'mine' : 'theirs'}">${!isMe ? `<div class="msg-sender">${m.name}</div>` : ''}${m.text}</div>`;
  });
  box.scrollTop = box.scrollHeight;
});

window.sendMsg = async () => {
  const input = document.getElementById("msgInput");
  if (!input.value.trim()) return;
  await addDoc(chatRef, { text: input.value.trim(), name: user.name, username: user.username, time: Date.now() });
  input.value = "";
};
</script>
</body>
</html>
