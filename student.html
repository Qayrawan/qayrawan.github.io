<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة الطالب</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #38bdf8;
  --accent-btn: #2563eb;
  --accent-btn-hover: #1d4ed8;
  --font-size: 14px;
  --bubble-radius: 14px;
}

body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  overflow-x: hidden;
}

/* ── TOPBAR ── */
.topbar {
  height: 60px;
  background: #111827;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 16px;
  border-bottom: 1px solid #1f2937;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50;
}
.title { font-weight: bold; font-size: 17px; }
.pfp {
  width: 38px; height: 38px; border-radius: 50%;
  overflow: hidden; background: #374151; cursor: pointer;
  border: 2px solid #374151; transition: border-color 0.2s; flex-shrink: 0;
}
.pfp:hover { border-color: var(--accent); }
.pfp img { width: 100%; height: 100%; object-fit: cover; }

/* ── PROFILE MINI BAR ── */
.profile {
  position: fixed;
  top: 68px; left: 12px;
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 12px;
  padding: 14px 16px;
  display: none;
  z-index: 200;
  min-width: 200px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  animation: fadeDown 0.15s ease;
}
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.profile-name  { font-size: 15px; font-weight: bold; margin-bottom: 4px; }
.profile-user  { color: #94a3b8; font-size: 13px; margin-bottom: 4px; }
.profile-class { color: var(--accent); font-size: 13px; margin-bottom: 12px; }
.profile-logout {
  background: #ef4444; border: none; color: white;
  padding: 8px 14px; border-radius: 8px; cursor: pointer;
  width: 100%; font-size: 13px; transition: background 0.2s;
}
.profile-logout:hover { background: #dc2626; }

/* ── BOTTOM NAV ── */
.bottomnav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 64px;
  background: #111827;
  border-top: 1px solid #1f2937;
  display: flex;
  z-index: 50;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer; position: relative;
  font-size: 11px; color: #6b7280; gap: 3px;
  transition: color 0.2s; user-select: none;
}
.nav-item .icon { font-size: 22px; line-height: 1; }
.nav-item.active { color: var(--accent); }
.nav-item:hover  { color: #cbd5e1; }
.badge {
  position: absolute; top: 6px; left: 50%; margin-left: 4px;
  background: #ef4444; color: white; font-size: 10px; font-weight: bold;
  border-radius: 10px; padding: 1px 5px; min-width: 16px;
  text-align: center; display: none;
}

/* ── SECTIONS ── */
.section {
  display: none;
  position: fixed;
  top: 60px; left: 0; right: 0; bottom: 64px;
  overflow-y: auto;
  padding: 12px;
  -webkit-overflow-scrolling: touch;
}
.section.active { display: block; }

/* ── HOME ── */
.home-card {
  background: #1f2937; padding: 16px;
  border-radius: 14px; margin-bottom: 12px;
}
.home-card h3 { font-size: 18px; margin-bottom: 4px; }
.home-card p  { color: #9ca3af; font-size: 13px; }

.section-label {
  font-size: 12px; color: #6b7280;
  margin: 16px 0 8px; text-transform: uppercase; letter-spacing: 0.05em;
}

/* ANNOUNCEMENTS */
.announcement {
  background: #1f2937;
  border-right: 3px solid var(--accent);
  border-radius: 0 12px 12px 0;
  padding: 12px 14px;
  margin-bottom: 10px;
  font-size: var(--font-size);
  line-height: 1.6;
  animation: fadeIn 0.2s ease;
}
.announcement .ann-meta {
  font-size: 11px; color: #475569; margin-top: 6px;
}
.announcement .ann-title {
  font-weight: bold; color: var(--accent);
  font-size: 13px; margin-bottom: 4px;
}

/* ── SUBJECT LIST ── */
.subject-item {
  background: #1f2937;
  margin: 10px 0;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px;
  cursor: pointer;
  transition: background 0.15s;
  user-select: none;
}
.subject-item:hover  { background: #263244; }
.subject-item:active { background: #1e3a8a; }
.subject-item .sub-name  { font-size: 15px; }
.subject-item .sub-arrow { color: #6b7280; font-size: 13px; }

/* ── SUBJECT SCREEN ── */
.subject-screen {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #0f172a;
  z-index: 100;
  transform: translateX(-100%);
  transition: transform 0.28s cubic-bezier(.4,0,.2,1);
  display: flex;
  flex-direction: column;
}
.subject-screen.open { transform: translateX(0); }

.subject-topbar {
  height: 60px;
  background: #111827;
  display: flex;
  align-items: center;
  padding: 0 14px;
  border-bottom: 1px solid #1f2937;
  flex-shrink: 0;
  gap: 12px;
}
.back-btn {
  background: none; border: none; color: var(--accent);
  font-size: 22px; cursor: pointer; padding: 0; line-height: 1; flex-shrink: 0;
}
.subject-topbar-title { font-weight: bold; font-size: 16px; flex: 1; }

.subject-tabs {
  display: flex;
  border-bottom: 1px solid #1f2937;
  background: #111827;
  flex-shrink: 0;
}
.s-tab {
  flex: 1; padding: 12px 0; text-align: center;
  font-size: 13px; color: #6b7280; cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: 0.2s; user-select: none;
}
.s-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.tab-panel {
  display: none; flex: 1;
  overflow-y: auto; padding: 12px;
  -webkit-overflow-scrolling: touch;
}
.tab-panel.active { display: block; }

.teacher-post {
  background: #1f2937;
  border-right: 3px solid var(--accent);
  padding: 12px 14px;
  border-radius: 0 10px 10px 0;
  margin-bottom: 10px;
  font-size: var(--font-size);
  line-height: 1.6;
  animation: fadeIn 0.2s ease;
}
.teacher-post .post-meta { font-size: 11px; color: #475569; margin-top: 6px; }
.teacher-post .post-due  { font-size: 12px; color: #fbbf24; margin-top: 4px; }

.empty-state {
  text-align: center; color: #475569;
  font-size: 14px; padding: 40px 0;
}

/* ── CHAT ── */
#chat {
  display: none;
  flex-direction: column;
  padding: 12px;
}
#chat.active { display: flex; }

.messages {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding-bottom: 8px;
  min-height: 0;
  /* fills available space above input */
  max-height: calc(100vh - 60px - 64px - 58px - 24px - 20px);
}

.msg {
  max-width: 78%; padding: 9px 12px;
  border-radius: var(--bubble-radius); word-break: break-word;
  font-size: var(--font-size); line-height: 1.4;
}
.msg.mine {
  background: var(--accent-btn);
  border-radius: var(--bubble-radius) var(--bubble-radius) 2px var(--bubble-radius);
  align-self: flex-start;
}
.msg.theirs {
  background: #1f2937;
  border-radius: var(--bubble-radius) var(--bubble-radius) var(--bubble-radius) 2px;
  align-self: flex-end;
}
.msg .sender { font-size: 11px; color: var(--accent); margin-bottom: 3px; font-weight: bold; }
.msg .time   { font-size: 10px; color: #475569; margin-top: 3px; }

.typing-indicator {
  font-size: 12px; color: #6b7280;
  min-height: 18px; font-style: italic;
  padding: 2px 0;
  flex-shrink: 0;
}

.chat-input-bar {
  display: flex; gap: 8px;
  padding-top: 6px;
  flex-shrink: 0;
}

input[type=text] {
  flex: 1; padding: 11px 14px;
  background: #1f2937; border: 1px solid #374151;
  color: white; border-radius: 10px; font-size: var(--font-size);
  outline: none; transition: border-color 0.2s; font-family: Arial;
}
input[type=text]:focus { border-color: var(--accent); }
.send-btn {
  padding: 11px 16px; background: var(--accent-btn); border: none;
  color: white; border-radius: 10px; cursor: pointer;
  font-size: 16px; transition: background 0.2s; flex-shrink: 0;
}
.send-btn:hover { background: var(--accent-btn-hover); }

/* ── SETTINGS ── */
.settings-group {
  background: #1f2937; border-radius: 14px;
  margin-bottom: 14px; overflow: hidden;
}
.settings-group-title {
  font-size: 11px; color: #6b7280;
  padding: 12px 14px 6px; letter-spacing: 0.06em;
  text-transform: uppercase;
}
.setting-row {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 13px 14px;
  border-top: 1px solid #374151;
  font-size: 14px;
}
.setting-row:first-of-type { border-top: none; }

/* COLOR SWATCHES */
.swatch-row { display: flex; gap: 10px; flex-wrap: wrap; }
.swatch {
  width: 28px; height: 28px; border-radius: 50%;
  cursor: pointer; border: 2px solid transparent;
  transition: border-color 0.2s, transform 0.15s;
}
.swatch.selected { border-color: white; transform: scale(1.15); }

/* FONT SIZE BUTTONS */
.size-row { display: flex; gap: 6px; }
.size-btn {
  padding: 5px 12px; border-radius: 8px;
  background: #374151; border: 2px solid transparent;
  color: white; cursor: pointer; font-size: 13px;
  transition: 0.2s;
}
.size-btn.selected { border-color: var(--accent); background: #1e3a5f; }

/* BUBBLE STYLE */
.bubble-btn {
  padding: 5px 12px; border-radius: 8px;
  background: #374151; border: 2px solid transparent;
  color: white; cursor: pointer; font-size: 13px;
  transition: 0.2s;
}
.bubble-btn.selected { border-color: var(--accent); background: #1e3a5f; }

/* TOGGLE */
.toggle {
  position: relative; width: 44px; height: 24px;
}
.toggle input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute; inset: 0;
  background: #374151; border-radius: 24px;
  transition: 0.3s; cursor: pointer;
}
.slider:before {
  content: ""; position: absolute;
  width: 18px; height: 18px; border-radius: 50%;
  left: 3px; top: 3px; background: white;
  transition: 0.3s;
}
input:checked + .slider { background: var(--accent-btn); }
input:checked + .slider:before { transform: translateX(20px); }

/* SKELETON */
.skeleton {
  background: linear-gradient(90deg, #1f2937 25%, #2d3748 50%, #1f2937 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 8px; height: 72px; margin: 10px 0;
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.fade-in { animation: fadeIn 0.2s ease; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="title">لوحة الطالب</div>
  <div class="pfp" onclick="window.toggleProfile()" id="pfpBox">
    <img src="placeholder.png" alt="pfp">
  </div>
</div>

<!-- PROFILE MINI BAR -->
<div class="profile" id="profile">
  <div class="profile-name"  id="pName"></div>
  <div class="profile-user"  id="pUser"></div>
  <div class="profile-class" id="pClass"></div>
  <button class="profile-logout" onclick="window.logout()">🚪 تسجيل خروج</button>
</div>

<!-- HOME -->
<div id="home" class="section active">
  <div class="home-card">
    <h3 id="homeGreeting">👋 أهلاً</h3>
    <p>تابع واجباتك وتواصل مع زملائك بسهولة</p>
  </div>
  <div class="section-label">📢 إعلانات الإدارة</div>
  <div id="announcementsList">
    <div class="skeleton" style="height:60px"></div>
    <div class="skeleton" style="height:48px;width:85%"></div>
  </div>
</div>

<!-- HOMEWORK -->
<div id="homework" class="section">
  <p style="color:#6b7280;font-size:13px;margin-bottom:10px">اختر مادة للاطلاع على الواجبات</p>
  <div id="subjectList"></div>
</div>

<!-- CHAT -->
<div id="chat" class="section">
  <div class="messages" id="messages">
    <div class="skeleton"></div>
    <div class="skeleton" style="width:55%"></div>
    <div class="skeleton" style="width:70%"></div>
  </div>
  <div class="typing-indicator" id="typingIndicator"></div>
  <div class="chat-input-bar">
    <input type="text" id="msgInput" placeholder="اكتب رسالة...">
    <button class="send-btn" onclick="window.sendMsg()">➤</button>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings" class="section">

  <div class="settings-group">
    <div class="settings-group-title">🎨 لون التمييز</div>
    <div class="setting-row">
      <span>اللون</span>
      <div class="swatch-row" id="swatchRow">
        <div class="swatch selected" data-accent="#38bdf8" data-btn="#2563eb" data-btnhover="#1d4ed8" style="background:#38bdf8"></div>
        <div class="swatch" data-accent="#34d399" data-btn="#059669" data-btnhover="#047857" style="background:#34d399"></div>
        <div class="swatch" data-accent="#a78bfa" data-btn="#7c3aed" data-btnhover="#6d28d9" style="background:#a78bfa"></div>
        <div class="swatch" data-accent="#fb923c" data-btn="#ea580c" data-btnhover="#c2410c" style="background:#fb923c"></div>
        <div class="swatch" data-accent="#f472b6" data-btn="#db2777" data-btnhover="#be185d" style="background:#f472b6"></div>
      </div>
    </div>
  </div>

  <div class="settings-group">
    <div class="settings-group-title">🔤 حجم الخط</div>
    <div class="setting-row">
      <span>الحجم</span>
      <div class="size-row">
        <button class="size-btn" data-size="12px">ص</button>
        <button class="size-btn selected" data-size="14px">م</button>
        <button class="size-btn" data-size="16px">ك</button>
      </div>
    </div>
  </div>

  <div class="settings-group">
    <div class="settings-group-title">💬 فقاعات الدردشة</div>
    <div class="setting-row">
      <span>الشكل</span>
      <div class="size-row">
        <button class="bubble-btn selected" data-radius="14px">مدور</button>
        <button class="bubble-btn" data-radius="6px">مربع</button>
        <button class="bubble-btn" data-radius="20px">بيضاوي</button>
      </div>
    </div>
  </div>

  <div class="settings-group">
    <div class="settings-group-title">⚙️ عام</div>
    <div class="setting-row">
      <span>إظهار الوقت في الرسائل</span>
      <label class="toggle">
        <input type="checkbox" id="toggleTimestamps" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="setting-row">
      <span>رسائل مضغوطة</span>
      <label class="toggle">
        <input type="checkbox" id="toggleCompact">
        <span class="slider"></span>
      </label>
    </div>
  </div>

</div>

<!-- SUBJECT SCREEN (slides in) -->
<div class="subject-screen" id="subjectScreen">
  <div class="subject-topbar">
    <button class="back-btn" onclick="window.closeSubject()">◀</button>
    <div class="subject-topbar-title" id="subjectScreenTitle"></div>
  </div>

  <div class="subject-tabs">
    <div class="s-tab active" data-panel="panelPosts">📢 واجبات المعلم</div>
  </div>

  <div class="tab-panel active" id="panelPosts">
    <div class="skeleton"></div>
    <div class="skeleton" style="height:50px;width:80%"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottomnav">
  <div class="nav-item active" id="nav-home"     onclick="window.openSection('home')">
    <span class="icon">🏠</span><span>الرئيسية</span>
  </div>
  <div class="nav-item"        id="nav-homework" onclick="window.openSection('homework')">
    <span class="icon">📚</span><span>الواجبات</span>
    <span class="badge" id="hwBadge"></span>
  </div>
  <div class="nav-item"        id="nav-chat"     onclick="window.openSection('chat')">
    <span class="icon">💬</span><span>الدردشة</span>
    <span class="badge" id="chatBadge"></span>
  </div>
  <div class="nav-item"        id="nav-settings" onclick="window.openSection('settings')">
    <span class="icon">⚙️</span><span>الإعدادات</span>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, onSnapshot,
  query, orderBy, doc, setDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ── FIREBASE ── */
const app = initializeApp({
  apiKey:     "AIzaSyD3vUPTVJoa3-CUvscE9rq4gGOg-SAko2k",
  authDomain: "qayrawan-school-system.firebaseapp.com",
  projectId:  "qayrawan-school-system"
});
const db = getFirestore(app);

/* ── USER ── */
const raw  = JSON.parse(localStorage.getItem("user"));
if (!raw) location.href = "index.html";

/* normalise — works whether login saved displayName or name */
const user = {
  name:     raw.displayName || raw.name || raw.username || "طالب",
  username: raw.username || "unknown",
  class:    raw.class    || "—",
  pfp:      raw.pfp      || "",
  role:     raw.role     || "student"
};

/* ── HELPERS ── */
function sanitize(str) {
  const d = document.createElement("div");
  d.textContent = str ?? "";
  return d.innerHTML;
}
function formatTime(ts) {
  const d = new Date(ts);
  return d.getHours().toString().padStart(2,"0") + ":" +
         d.getMinutes().toString().padStart(2,"0");
}
function updateBadge(id, count) {
  const b = document.getElementById(id);
  if (!b) return;
  b.textContent  = count > 99 ? "99+" : count;
  b.style.display = count > 0 ? "inline" : "none";
}

/* ── SETTINGS (load from localStorage) ── */
const prefs = JSON.parse(localStorage.getItem("prefs") || "{}");
function applyPrefs() {
  const root = document.documentElement;
  root.style.setProperty("--accent",       prefs.accent     || "#38bdf8");
  root.style.setProperty("--accent-btn",   prefs.accentBtn  || "#2563eb");
  root.style.setProperty("--accent-btn-hover", prefs.accentBtnHover || "#1d4ed8");
  root.style.setProperty("--font-size",    prefs.fontSize   || "14px");
  root.style.setProperty("--bubble-radius",prefs.bubbleRadius|| "14px");

  document.getElementById("toggleTimestamps").checked = prefs.timestamps !== false;
  document.getElementById("toggleCompact").checked    = !!prefs.compact;

  if (prefs.compact) document.documentElement.style.setProperty("--msg-padding","5px 8px");
  else               document.documentElement.style.removeProperty("--msg-padding");

  /* mark selected swatches/buttons */
  document.querySelectorAll(".swatch").forEach(s =>
    s.classList.toggle("selected", s.dataset.accent === (prefs.accent || "#38bdf8"))
  );
  document.querySelectorAll(".size-btn").forEach(b =>
    b.classList.toggle("selected", b.dataset.size === (prefs.fontSize || "14px"))
  );
  document.querySelectorAll(".bubble-btn").forEach(b =>
    b.classList.toggle("selected", b.dataset.radius === (prefs.bubbleRadius || "14px"))
  );
}
applyPrefs();

/* swatch clicks */
document.getElementById("swatchRow").addEventListener("click", e => {
  const sw = e.target.closest(".swatch");
  if (!sw) return;
  prefs.accent          = sw.dataset.accent;
  prefs.accentBtn       = sw.dataset.btn;
  prefs.accentBtnHover  = sw.dataset.btnhover;
  localStorage.setItem("prefs", JSON.stringify(prefs));
  applyPrefs();
});

/* font size */
document.querySelectorAll(".size-btn").forEach(b => {
  b.addEventListener("click", () => {
    prefs.fontSize = b.dataset.size;
    localStorage.setItem("prefs", JSON.stringify(prefs));
    applyPrefs();
  });
});

/* bubble style */
document.querySelectorAll(".bubble-btn").forEach(b => {
  b.addEventListener("click", () => {
    prefs.bubbleRadius = b.dataset.radius;
    localStorage.setItem("prefs", JSON.stringify(prefs));
    applyPrefs();
  });
});

/* toggles */
document.getElementById("toggleTimestamps").addEventListener("change", e => {
  prefs.timestamps = e.target.checked;
  localStorage.setItem("prefs", JSON.stringify(prefs));
  /* hide/show all .time elements */
  document.querySelectorAll(".msg .time").forEach(t =>
    t.style.display = prefs.timestamps ? "" : "none"
  );
});

document.getElementById("toggleCompact").addEventListener("change", e => {
  prefs.compact = e.target.checked;
  localStorage.setItem("prefs", JSON.stringify(prefs));
  applyPrefs();
  document.querySelectorAll(".msg").forEach(m =>
    m.style.padding = prefs.compact ? "5px 8px" : ""
  );
});

/* ── PROFILE ── */
document.getElementById("pfpBox").innerHTML =
  `<img src="${sanitize(user.pfp || "placeholder.png")}" alt="pfp">`;

document.getElementById("homeGreeting").textContent = `👋 أهلاً ${user.name}`;
document.getElementById("pName").textContent  = user.name;
document.getElementById("pUser").textContent  = `@${user.username}`;
document.getElementById("pClass").textContent = user.class;

window.toggleProfile = () => {
  const p = document.getElementById("profile");
  p.style.display = p.style.display === "block" ? "none" : "block";
};
document.addEventListener("click", e => {
  if (!e.target.closest(".pfp") && !e.target.closest("#profile"))
    document.getElementById("profile").style.display = "none";
});

/* ── NAVIGATION ── */
window.openSection = (id) => {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
  document.getElementById(`nav-${id}`)?.classList.add("active");

  if (id === "chat")     { localStorage.setItem("lastSeenChat", Date.now()); updateBadge("chatBadge", 0); }
  if (id === "homework") { localStorage.setItem("lastSeenHw",   Date.now()); updateBadge("hwBadge",   0); }
};

/* ── ANNOUNCEMENTS ── */
const annRef = collection(db, "announcements");
onSnapshot(query(annRef, orderBy("time", "desc")), snap => {
  const box = document.getElementById("announcementsList");

  if (snap.empty) {
    box.innerHTML = `<div class="empty-state" style="padding:20px 0">لا توجد إعلانات حالياً</div>`;
    return;
  }

  box.innerHTML = "";
  snap.forEach(d => {
    const m  = d.data();
    const el = document.createElement("div");
    el.className = "announcement fade-in";
    el.innerHTML = `
      ${m.title ? `<div class="ann-title">${sanitize(m.title)}</div>` : ""}
      ${sanitize(m.text)}
      <div class="ann-meta">📌 ${sanitize(m.author || "الإدارة")} · ${formatTime(m.time)}</div>
    `;
    box.appendChild(el);
  });
});

/* ── SUBJECTS ── */
const subjects = [
  "التربية الاسلامية","اللغة العربية","اللغة الانجليزية",
  "الاحياء","الكيمياء","الفيزياء","الرياضيات",
  "جرائم حزب البعث","اللغة الفرنسية","التربية الفنية","الحاسوب"
];

const subjectList = document.getElementById("subjectList");
subjects.forEach(sub => {
  const el = document.createElement("div");
  el.className = "subject-item";
  el.innerHTML = `
    <span class="sub-name">${sanitize(sub)}</span>
    <span class="sub-arrow">◀</span>
  `;
  el.addEventListener("click", () => window.openSubject(sub));
  subjectList.appendChild(el);
});

/* ── SUBJECT SCREEN ── */
let activeSubjectUnsub = null;

window.openSubject = (sub) => {
  document.getElementById("subjectScreenTitle").textContent = sub;
  document.getElementById("subjectScreen").classList.add("open");

  const postsPanel = document.getElementById("panelPosts");
  postsPanel.innerHTML = `<div class="skeleton"></div><div class="skeleton" style="height:50px;width:80%"></div>`;

  if (activeSubjectUnsub) { activeSubjectUnsub(); activeSubjectUnsub = null; }

  const ref = collection(db, "classes", user.class, "homework", sub, "messages");
  activeSubjectUnsub = onSnapshot(query(ref, orderBy("time")), snap => {
    if (snap.empty) {
      postsPanel.innerHTML = `<div class="empty-state">📭 لا يوجد واجب حالياً</div>`;
      return;
    }
    postsPanel.innerHTML = "";
    snap.forEach(d => {
      const m  = d.data();
      const el = document.createElement("div");
      el.className = "teacher-post fade-in";
      el.innerHTML = `
        ${sanitize(m.text)}
        ${m.due ? `<div class="post-due">⏳ الموعد: ${sanitize(m.due)}</div>` : ""}
        <div class="post-meta">${formatTime(m.time)}</div>
      `;
      postsPanel.appendChild(el);
    });
  });
};

window.closeSubject = () => {
  document.getElementById("subjectScreen").classList.remove("open");
  if (activeSubjectUnsub) { activeSubjectUnsub(); activeSubjectUnsub = null; }
};

/* ── CHAT ── */
const chatRef   = collection(db, "classes", user.class, "messages");
const chatQuery = query(chatRef, orderBy("time"));
let   chatReady = false;

function makeMsg(m) {
  const isMe     = m.username === user.username;
  const showTime = document.getElementById("toggleTimestamps").checked;
  const compact  = document.getElementById("toggleCompact").checked;

  const el = document.createElement("div");
  el.className = `msg fade-in ${isMe ? "mine" : "theirs"}`;
  if (compact) el.style.padding = "5px 8px";
  el.innerHTML = `
    ${!isMe ? `<div class="sender">${sanitize(m.name)} · ${sanitize(m.class)}</div>` : ""}
    ${sanitize(m.text)}
    <div class="time" style="${showTime ? "" : "display:none"}">${formatTime(m.time)}</div>
  `;
  return el;
}

onSnapshot(chatQuery, snap => {
  const box        = document.getElementById("messages");
  const chatActive = document.getElementById("chat").classList.contains("active");
  const lastSeen   = parseInt(localStorage.getItem("lastSeenChat") || "0");

  if (!chatReady) { box.innerHTML = ""; chatReady = true; }

  box.innerHTML = "";
  let unread = 0;

  snap.forEach(d => {
    const m    = d.data();
    const isMe = m.username === user.username;
    if (!chatActive && !isMe && m.time > lastSeen) unread++;
    box.appendChild(makeMsg(m));
  });

  if (!chatActive && unread > 0) updateBadge("chatBadge", unread);
  box.scrollTop = box.scrollHeight;
});

window.sendMsg = async () => {
  const input = document.getElementById("msgInput");
  if (!input.value.trim()) return;
  await addDoc(chatRef, {
    text:     input.value.trim(),
    name:     user.name,
    username: user.username,
    class:    user.class,
    time:     Date.now()
  });
  input.value = "";
  clearTimeout(typingTimeout);
  try { await deleteDoc(doc(db, "classes", user.class, "typing", user.username)); } catch {}
};

document.getElementById("msgInput").addEventListener("keydown", e => {
  if (e.key === "Enter") window.sendMsg();
});

/* ── TYPING ── */
let typingTimeout;
document.getElementById("msgInput").addEventListener("input", async () => {
  try {
    await setDoc(doc(db, "classes", user.class, "typing", user.username), {
      name: user.name, ts: Date.now()
    });
  } catch {}
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(async () => {
    try { await deleteDoc(doc(db, "classes", user.class, "typing", user.username)); } catch {}
  }, 2500);
});

onSnapshot(collection(db, "classes", user.class, "typing"), snap => {
  const now = Date.now();
  const typers = [];
  snap.forEach(d => {
    if (d.id !== user.username && now - d.data().ts < 4000)
      typers.push(sanitize(d.data().name));
  });
  document.getElementById("typingIndicator").textContent =
    typers.length === 0 ? "" :
    typers.length === 1 ? `${typers[0]} يكتب...` :
    `${typers.join("، ")} يكتبون...`;
});

/* ── LOGOUT ── */
window.logout = () => {
  localStorage.removeItem("user");
  location.href = "index.html";
};
</script>
</body>
</html>
