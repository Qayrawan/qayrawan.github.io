<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة الطالب</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;font-family:Arial}
body{margin:0;background:#0f172a;color:white;overflow:hidden}

/* TOPBAR */
.topbar{
  height:60px;
  background:#111827;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 12px;
  border-bottom:1px solid #1f2937;
}

.menuBtn{font-size:26px;cursor:pointer}
.title{font-weight:bold}

.pfp{
  width:38px;height:38px;border-radius:50%;
  overflow:hidden;cursor:pointer;background:#374151;
}
.pfp img{width:100%;height:100%;object-fit:cover}

/* PROFILE POPUP */
.profileBar{
  position:fixed;
  top:65px;
  right:10px;
  background:#111827;
  border:1px solid #1f2937;
  border-radius:10px;
  padding:10px;
  display:none;
  z-index:50;
}

/* MENU */
.menu{
  position:fixed;
  right:-260px;
  top:0;
  width:260px;height:100%;
  background:#111827;
  transition:.3s;
  padding-top:60px;
  border-left:1px solid #1f2937;
  z-index:40;
}
.menu.open{right:0}

.menu div{
  padding:15px;
  border-bottom:1px solid #1f2937;
  cursor:pointer;
}

/* CHAT */
.chat{
  height:calc(100vh - 60px);
  display:flex;
  flex-direction:column;
}

.messages{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.msg{
  background:#1f2937;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  max-width:75%;
}

.meta{
  font-size:12px;
  color:#9ca3af;
  margin-bottom:4px;
}

/* INPUT */
.inputBox{
  display:flex;
  gap:8px;
  padding:10px;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1f2937;
  color:white;
}

button{
  padding:10px;
  border:none;
  background:#2563eb;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* HOMEWORK PANEL */
.homework{
  position:fixed;
  left:-320px;
  top:0;
  width:320px;height:100%;
  background:#0b1220;
  transition:.3s;
  padding:60px 10px;
  border-right:1px solid #1f2937;
  z-index:30;
}
.homework.open{left:0}

.subject{
  padding:10px;
  margin:6px 0;
  background:#1f2937;
  border-radius:8px;
  cursor:pointer;
}

/* SUBJECT VIEW */
.subjectView{
  position:fixed;
  left:0;
  top:0;
  width:100%;height:100%;
  background:#0f172a;
  display:none;
  flex-direction:column;
  z-index:60;
}

.subjectMessages{
  flex:1;
  overflow:auto;
  padding:10px;
}

.readonly{
  text-align:center;
  padding:10px;
  color:#9ca3af;
}

/* SETTINGS */
.settings{
  position:fixed;
  bottom:10px;
  right:10px;
  background:#111827;
  border:1px solid #1f2937;
  padding:10px;
  display:none;
}

</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="menuBtn" onclick="toggleMenu()">≡</div>
  <div class="title">لوحة الطالب</div>
  <div class="pfp" onclick="toggleProfile()" id="pfpBox"></div>
</div>

<!-- PROFILE -->
<div class="profileBar" id="profileBar"></div>

<!-- MENU -->
<div class="menu" id="menu">
  <div onclick="toggleHomework()">📚 الواجبات</div>
  <div onclick="toggleSettings()">⚙️ الإعدادات</div>
  <div onclick="logout()">🚪 تسجيل خروج</div>
</div>

<!-- HOMEWORK -->
<div class="homework" id="homework"></div>

<!-- SUBJECT VIEW -->
<div class="subjectView" id="subjectView">
  <div class="topbar">
    <button onclick="closeSubject()">⬅</button>
    <div id="subjectTitle"></div>
  </div>
  <div class="subjectMessages" id="subjectMessages"></div>
  <div class="readonly">📢 هذا القسم للمعلم فقط</div>
</div>

<!-- CHAT -->
<div class="chat">
  <div class="messages" id="messages"></div>

  <div class="inputBox">
    <input id="input" placeholder="اكتب رسالة..." />
    <button onclick="send()">إرسال</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyD3vUPTVJoa3-CUvscE9rq4gGOg-SAko2k",
  authDomain: "qayrawan-school-system.firebaseapp.com",
  projectId: "qayrawan-school-system",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* USER */
let user = JSON.parse(localStorage.getItem("user"));
if(!user) location.href="index.html";

/* PROFILE */
pfpBox.innerHTML = `<img src="${user.pfp || 'placeholder.png'}">`;

function toggleProfile(){
  const bar = document.getElementById("profileBar");
  bar.innerHTML = `
    <b>${user.name}</b><br>
    @${user.username}<br>
    الصف: ${user.class}
  `;
  bar.style.display = "block";
}

/* close profile outside click */
document.addEventListener("click", e=>{
  if(!e.target.closest(".pfp") && !e.target.closest("#profileBar")){
    profileBar.style.display="none";
  }
});

/* MENU */
function toggleMenu(){
  menu.classList.toggle("open");
}

/* SETTINGS */
function toggleSettings(){
  alert("قريباً...");
}

/* HOMEWORK SUBJECTS */
const subjects = [
"التربية الاسلامية",
"اللغة العربية",
"اللغة الانجليزية",
"الاحياء",
"الفيزياء",
"الكيمياء",
"الرياضيات",
"جرائم حزب البعث",
"اللغة الفرنسية",
"التربية الفنية",
"الحاسوب"
];

subjects.forEach(sub=>{
  homework.innerHTML += `<div class="subject" onclick="openSubject('${sub}')">${sub}</div>`;
});

/* SUBJECT VIEW */
function openSubject(name){
  subjectView.style.display="flex";
  subjectTitle.innerText=name;

  subjectMessages.innerHTML="<p style='color:gray'>لا يوجد واجبات بعد</p>";
}

function closeSubject(){
  subjectView.style.display="none";
}

/* HOMEWORK PANEL */
function toggleHomework(){
  homework.classList.toggle("open");
}

/* CHAT REALTIME */
const q = query(collection(db,"messages"), orderBy("time"));

onSnapshot(q, snap=>{
  messages.innerHTML="";
  snap.forEach(doc=>{
    const m = doc.data();
    messages.innerHTML += `
      <div class="msg">
        <div class="meta">${m.name}/${m.class}</div>
        ${m.text}
      </div>`;
  });
});

/* SEND */
async function send(){
  if(!input.value) return;

  await addDoc(collection(db,"messages"),{
    text: input.value,
    name: user.name,
    class: user.class,
    time: Date.now()
  });

  input.value="";
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("user");
  location.href="index.html";
}
</script>

</body>
</html>
