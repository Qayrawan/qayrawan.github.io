<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة الطالب</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* TOPBAR */
.topbar{
  height:60px;
  background:#111827;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 12px;
}

.menuBtn{font-size:24px;cursor:pointer;}
.pfp{width:38px;height:38px;border-radius:50%;overflow:hidden;background:#333;cursor:pointer;}
.pfp img{width:100%;height:100%;object-fit:cover;}

/* MENU */
.menu{
  position:fixed;
  right:-260px;
  top:0;
  width:260px;
  height:100%;
  background:#111827;
  transition:.3s;
  padding-top:60px;
}
.menu.open{right:0;}
.menu div{
  padding:15px;
  border-bottom:1px solid #1f2937;
  cursor:pointer;
}

/* SECTIONS */
.section{display:none;padding:10px;height:calc(100vh - 60px);}
.active{display:block;}

/* HOMEWORK */
.subject{
  background:#1f2937;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
}

/* CHAT */
.messages{height:80%;overflow:auto;}
.msg{background:#1f2937;padding:8px;margin:6px 0;border-radius:8px;}
.inputBox{display:flex;gap:8px;}
input{flex:1;padding:10px;background:#1f2937;border:none;color:white;border-radius:8px;}
button{padding:10px;background:#2563eb;border:none;color:white;border-radius:8px;cursor:pointer;}
</style>
</head>

<body>

<div class="topbar">
  <div class="menuBtn" onclick="toggleMenu()">≡</div>
  <div>لوحة الطالب</div>
  <div class="pfp" onclick="toggleProfile()" id="pfpBox"></div>
</div>

<div class="menu" id="menu">
  <div onclick="openSection('home')">🏠 الرئيسية</div>
  <div onclick="openSection('homework')">📚 الواجبات</div>
  <div onclick="openSection('chat')">💬 الدردشة</div>
  <div onclick="logout()">🚪 خروج</div>
</div>

<!-- HOME -->
<div id="home" class="section active">
  <h3>👋 أهلاً بك</h3>
</div>

<!-- HOMEWORK -->
<div id="homework" class="section"></div>

<!-- CHAT -->
<div id="chat" class="section">
  <div class="messages" id="messages"></div>
  <div class="inputBox">
    <input id="msgInput" placeholder="اكتب رسالة...">
    <button onclick="sendMsg()">إرسال</button>
  </div>
</div>

<!-- PROFILE -->
<div id="profile" style="position:fixed;top:70px;right:10px;background:#111827;padding:10px;border-radius:10px;display:none;"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD3vUPTVJoa3-CUvscE9rq4gGOg-SAko2k",
  authDomain: "qayrawan-school-system.firebaseapp.com",
  projectId: "qayrawan-school-system"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* USER */
let user = JSON.parse(localStorage.getItem("user"));
if(!user) location.href="index.html";

/* PROFILE */
document.getElementById("pfpBox").innerHTML =
`<img src="${user.pfp || 'placeholder.png'}">`;

function toggleProfile(){
  const p = document.getElementById("profile");
  p.innerHTML = `
  <img src="${user.pfp || 'placeholder.png'}" width="60">
  <h4>${user.name}</h4>
  <p>@${user.username}</p>
  <p>${user.class}</p>
  `;
  p.style.display = p.style.display=="block"?"none":"block";
}

/* MENU */
window.toggleMenu = ()=> document.getElementById("menu").classList.toggle("open");

window.openSection = (id)=>{
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* HOMEWORK SUBJECTS */
const subjects = [
"التربية الاسلامية",
"اللغة العربية",
"اللغة الانجليزية",
"الاحياء",
"الكيمياء",
"الفيزياء",
"الرياضيات",
"جرائم حزب البعث",
"اللغة الفرنسية",
"التربية الفنية",
"الحاسوب"
];

const hwDiv = document.getElementById("homework");

subjects.forEach(sub=>{
  const div = document.createElement("div");
  div.className="subject";
  div.innerHTML=`<b>${sub}</b><br><span style="color:gray">لا يوجد واجب حالياً</span>`;
  hwDiv.appendChild(div);
});

/* CHAT SYSTEM (REALTIME 🔥) */
const messagesRef = collection(db, "classes", user.class, "messages");

window.sendMsg = async ()=>{
  const input = document.getElementById("msgInput");
  if(!input.value) return;

  await addDoc(messagesRef,{
    text:input.value,
    name:user.name,
    time:Date.now()
  });

  input.value="";
};

const q = query(messagesRef, orderBy("time"));

onSnapshot(q,(snapshot)=>{
  const container = document.getElementById("messages");
  container.innerHTML="";

  snapshot.forEach(doc=>{
    const m = doc.data();
    const div = document.createElement("div");
    div.className="msg";
    div.innerHTML=`<b>${m.name}:</b> ${m.text}`;
    container.appendChild(div);
  });

  container.scrollTop = container.scrollHeight;
});

/* LOGOUT */
window.logout=()=>{
  localStorage.removeItem("user");
  location.href="index.html";
};
</script>

</body>
</html>
