<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الطالب</title>

<style>
:root{
  --bg:#0b1220;
  --panel:#111827;
  --line:#243042;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#38bdf8;
  --radius:16px;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  direction: rtl;
}

/* Layout */
.container{
  padding:16px;
}

.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:12px;
}

/* Header */
.header{
  font-size:1.3rem;
  font-weight:600;
  margin-bottom:10px;
}

/* Homework */
.homework{
  background:#0b1322;
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px;
  margin-top:10px;
}

.title{
  font-weight:600;
}

.meta{
  color:var(--muted);
  font-size:.85rem;
  margin-top:4px;
}

/* Empty state */
.empty{
  text-align:center;
  color:var(--muted);
  margin-top:20px;
}

/* Badge */
.badge{
  display:inline-block;
  padding:4px 8px;
  background:rgba(56,189,248,.12);
  color:#bae6fd;
  border-radius:999px;
  font-size:.75rem;
  margin-top:6px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">📚 واجباتك</div>

  <div id="homeworkList"></div>

</div>

<script>

/* =========================
   بيانات الطالب (عدّل هنا فقط)
========================= */
const student = {
  name: "منتظر",
  class: "4A" // 🔥 غيّر الصف هنا فقط
};

/* =========================
   قاعدة بيانات الواجبات
========================= */
const homeworkData = [
  {
    title: "رياضيات - الجبر",
    description: "حل تمارين صفحة 32",
    class: "4A",
    subject: "رياضيات",
    date: "اليوم"
  },
  {
    title: "إنشاء عربي",
    description: "اكتب عن مكانك المفضل",
    class: "4B",
    subject: "عربي",
    date: "غداً"
  },
  {
    title: "فيزياء",
    description: "دراسة الفصل الأول",
    class: "4A",
    subject: "فيزياء",
    date: "اليوم"
  }
];

/* =========================
   عرض الواجبات
========================= */
function renderHomework(){
  const container = document.getElementById("homeworkList");
  container.innerHTML = "";

  const filtered = homeworkData.filter(hw => hw.class === student.class);

  if(filtered.length === 0){
    container.innerHTML = `<div class="empty">لا يوجد واجبات حالياً 🎉</div>`;
    return;
  }

  filtered.forEach(hw => {
    const div = document.createElement("div");
    div.className = "homework";

    div.innerHTML = `
      <div class="title">${hw.title}</div>
      <div class="meta">${hw.description}</div>
      <div class="badge">${hw.subject} • ${hw.date}</div>
    `;

    container.appendChild(div);
  });
}

/* =========================
   تشغيل
========================= */
renderHomework();

</script>

</body>
</html>
