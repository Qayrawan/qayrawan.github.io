<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة الطالب</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      margin: 0;
      background: #0f172a;
      color: white;
      overflow: hidden;
    }

    /* TOP BAR */
    .topbar {
      height: 60px;
      background: #111827;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      border-bottom: 1px solid #1f2937;
    }

    .menuBtn {
      font-size: 26px;
      cursor: pointer;
    }

    .title {
      font-weight: bold;
    }

    .pfp {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #374151;
      cursor: pointer;
      overflow: hidden;
    }

    .pfp img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* SIDE MENU */
    .menu {
      position: fixed;
      top: 0;
      right: -260px;
      width: 260px;
      height: 100%;
      background: #111827;
      transition: 0.3s;
      padding-top: 60px;
      border-left: 1px solid #1f2937;
      z-index: 10;
    }

    .menu.open {
      right: 0;
    }

    .menu div {
      padding: 15px;
      border-bottom: 1px solid #1f2937;
      cursor: pointer;
    }

    /* CHAT AREA */
    .chat {
      height: calc(100vh - 60px);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 10px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      background: #1f2937;
      padding: 10px;
      margin: 6px 0;
      border-radius: 10px;
      max-width: 70%;
      width: fit-content;
    }

    .inputBox {
      display: flex;
      gap: 8px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
      background: #1f2937;
      color: white;
    }

    button {
      padding: 10px 14px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    /* PROFILE PANEL */
    .profile {
      position: fixed;
      top: 70px;
      right: 10px;
      width: 230px;
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 10px;
      padding: 12px;
      display: none;
      z-index: 20;
    }

    .profile img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
    }

    /* HOMEWORK PANEL */
    .homework {
      position: fixed;
      left: -300px;
      top: 0;
      width: 300px;
      height: 100%;
      background: #0b1220;
      transition: 0.3s;
      padding: 60px 10px 10px;
      border-right: 1px solid #1f2937;
      z-index: 15;
    }

    .homework.open {
      left: 0;
    }

    .hw {
      background: #1f2937;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
    }

    /* SETTINGS */
    .settings {
      position: fixed;
      bottom: 10px;
      right: 10px;
      width: 220px;
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 10px;
      padding: 12px;
      display: none;
      z-index: 25;
    }

  </style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="menuBtn" onclick="toggleMenu()">≡</div>
  <div class="title">لوحة الطالب</div>
  <div class="pfp" onclick="toggleProfile()" id="pfpBox"></div>
</div>

<!-- SIDE MENU -->
<div class="menu" id="menu">
  <div onclick="toggleHomework()">📚 الواجبات</div>
  <div onclick="toggleSettings()">⚙️ الإعدادات</div>
  <div onclick="logout()">🚪 تسجيل خروج</div>
</div>

<!-- HOMEWORK -->
<div class="homework" id="homework">
  <h3>📚 الواجبات</h3>
  <div class="hw">رياضيات - واجب 1</div>
  <div class="hw">فيزياء - تجربة</div>
  <div class="hw">عربي - كتابة</div>
</div>

<!-- CHAT -->
<div class="chat">
  <div class="messages" id="messages"></div>

  <div class="inputBox">
    <input id="input" placeholder="اكتب رسالة..." />
    <button onclick="send()">إرسال</button>
  </div>
</div>

<!-- PROFILE -->
<div class="profile" id="profile"></div>

<!-- SETTINGS -->
<div class="settings" id="settings">
  <h4>⚙️ الإعدادات</h4>
  <p>الوضع الليلي: مفعّل</p>
</div>

<script>
let user = null;

/* 🔐 AUTH CHECK */
window.onload = () => {
  user = JSON.parse(localStorage.getItem("user"));

  if (!user) {
    location.href = "index.html";
    return;
  }

  loadProfile();
};

/* 👤 PROFILE */
function loadProfile() {
  document.getElementById("pfpBox").innerHTML =
    `<img src="${user.pfp || 'placeholder.png'}">`;
}

function toggleProfile() {
  const p = document.getElementById("profile");

  p.innerHTML = `
    <img src="${user.pfp || 'placeholder.png'}">
    <h4>${user.name}</h4>
    <p>@${user.username}</p>
    <p>Class: ${user.class}</p>
  `;

  p.style.display = p.style.display === "block" ? "none" : "block";
}

/* ☰ MENU */
function toggleMenu() {
  document.getElementById("menu").classList.toggle("open");
}

/* 📚 HOMEWORK */
function toggleHomework() {
  document.getElementById("homework").classList.toggle("open");
}

/* ⚙️ SETTINGS */
function toggleSettings() {
  const s = document.getElementById("settings");
  s.style.display = s.style.display === "block" ? "none" : "block";
}

/* 💬 CHAT */
function send() {
  const input = document.getElementById("input");
  if (!input.value) return;

  const div = document.createElement("div");
  div.className = "msg";
  div.innerText = input.value;

  document.getElementById("messages").appendChild(div);
  input.value = "";
}

/* 🚪 LOGOUT */
function logout() {
  localStorage.removeItem("user");
  location.href = "index.html";
}
</script>

</body>
</html>
