<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة الطالب</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: monospace;
      background: #0f172a;
      color: #e2e8f0;
    }

    header {
      background: #1e293b;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #334155;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: url("placeholder.png");
      background-size: cover;
    }

    .logout {
      background: #ef4444;
      border: none;
      padding: 8px 12px;
      color: white;
      cursor: pointer;
      border-radius: 6px;
    }

    .container { padding: 15px; }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .homework {
      background: #334155;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      margin-top: 10px;
      padding: 8px;
      border-radius: 8px;
      border: none;
      background: #0f172a;
      color: white;
    }

    .actions {
      margin-top: 8px;
      display: flex;
      gap: 6px;
    }

    button {
      border: none;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      color: white;
    }

    .send { background: #22c55e; }
    .icon { background: #475569; }

  </style>
</head>

<body>

<header>
  <div style="display:flex; gap:10px; align-items:center;">
    <div class="avatar"></div>
    <h3 id="studentName">...</h3>
  </div>
  <button class="logout" onclick="logout()">تسجيل خروج</button>
</header>

<div class="container">

  <!-- 📚 Homework -->
  <div class="card">
    <h3>📚 الواجبات</h3>
    <div id="homeworkList"></div>

    <textarea id="hwInput" rows="2" placeholder="اكتب الحل..."></textarea>

    <div class="actions">
      <button class="icon">+</button>
      <button class="icon">🎤</button>
      <button class="send" onclick="submitHW()">إرسال</button>
    </div>
  </div>

</div>

<!-- 🔥 Firebase Script -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  where,
  onSnapshot,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔐 Your config
const firebaseConfig = {
  apiKey: "AIzaSyD3vUPTVJoa3-CUvscE9rq4gGOg-SAko2k",
  authDomain: "qayrawan-school-system.firebaseapp.com",
  projectId: "qayrawan-school-system",
  storageBucket: "qayrawan-school-system.firebasestorage.app",
  messagingSenderId: "785321248181",
  appId: "1:785321248181:web:643e6d29cdca556218c5fc"
};

// 🚀 Init
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

// 🔐 AUTH CHECK (THE MOST IMPORTANT PART)
onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;

    document.getElementById("studentName").innerText =
      user.email || "طالب";

    listenHomework(user.uid);

  } else {
    location.href = "index.html";
  }
});

// 📡 REALTIME HOMEWORK (THIS IS 🔥)
function listenHomework(uid) {
  const q = query(
    collection(db, "homework"),
    where("uid", "==", uid),
    orderBy("createdAt", "desc")
  );

  onSnapshot(q, (snapshot) => {
    const list = document.getElementById("homeworkList");
    list.innerHTML = "";

    snapshot.forEach((doc) => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "homework";
      div.innerText = data.text;

      list.appendChild(div);
    });
  });
}

// ✍️ SUBMIT HOMEWORK
window.submitHW = async function () {
  const input = document.getElementById("hwInput");

  if (!input.value.trim()) return;

  await addDoc(collection(db, "homework"), {
    text: input.value,
    uid: currentUser.uid,
    createdAt: Date.now()
  });

  input.value = "";
};

// 🚪 LOGOUT
window.logout = function () {
  signOut(auth);
};

</script>

</body>
</html>
