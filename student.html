<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Student Panel</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f1115;
  color: white;
}

/* TOP BAR */
.topbar {
  height: 60px;
  background: #151823;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 15px;
}

.menuBtn {
  font-size: 28px;
  cursor: pointer;
}

/* PROFILE */
.profileBtn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: gray;
  cursor: pointer;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  top: 60px;
  left: -220px;
  width: 220px;
  height: 100%;
  background: #1a1f2e;
  transition: 0.3s;
  padding: 10px;
}

.sidebar:hover {
  left: 0;
}

.sidebar a {
  display: block;
  padding: 12px;
  color: white;
  text-decoration: none;
}

.sidebar a:hover {
  background: #2a3145;
}

/* MAIN */
.main {
  padding: 20px;
}

/* HOMEWORK PANEL */
.hwPanel {
  background: #1a1f2e;
  padding: 15px;
  border-radius: 10px;
}

/* PROFILE MODAL */
.profileModal {
  position: fixed;
  top: 80px;
  right: 20px;
  width: 250px;
  background: #1a1f2e;
  padding: 15px;
  border-radius: 10px;
  display: none;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <div class="menuBtn">≡</div>
  <div class="profileBtn" onclick="toggleProfile()"></div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <a href="#">🏠 Home</a>
  <a href="#">📚 Homework</a>
  <a href="#">📢 Announcements</a>
  <a href="#">⚙️ Settings</a>
</div>

<!-- MAIN -->
<div class="main">
  <h2>Student Dashboard</h2>

  <div class="hwPanel">
    <h3>Homework</h3>
    <div id="hwList"></div>
  </div>
</div>

<!-- PROFILE -->
<div class="profileModal" id="profile">
  <h3 id="pName"></h3>
  <p id="pUser"></p>
  <p id="pClass"></p>
</div>

<script>
/* FIRESTORE STYLE DB */
const db = {
  users: {
    montadar: {
      name: "منتظر",
      username: "montadar",
      class: "4A",
      pfp: "placeholder.png"
    }
  },

  homework: {
    hw1: {
      title: "حل صفحة 32",
      class: "4A"
    },
    hw2: {
      title: "قراءة الفصل الأول",
      class: "4A"
    }
  }
};

let currentUser = db.users.montadar;

/* LOAD PROFILE */
function loadProfile(){
  document.getElementById("pName").innerText = currentUser.name;
  document.getElementById("pUser").innerText = "@"+currentUser.username;
  document.getElementById("pClass").innerText = currentUser.class;
}

/* TOGGLE PROFILE */
function toggleProfile(){
  let p = document.getElementById("profile");
  p.style.display = (p.style.display === "block") ? "none" : "block";
}

/* LOAD HOMEWORK */
function loadHomework(){
  let container = document.getElementById("hwList");
  container.innerHTML = "";

  Object.values(db.homework).forEach(hw => {
    let div = document.createElement("div");
    div.style.padding = "10px";
    div.style.marginTop = "10px";
    div.style.background = "#22283a";
    div.style.borderRadius = "8px";
    div.innerText = hw.title;

    container.appendChild(div);
  });
}

loadProfile();
loadHomework();
</script>

</body>
</html>
