<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق الطالب</title>

<style>
:root{
  --bg:#0b1220;
  --panel:#111827;
  --line:#243042;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#38bdf8;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

/* TOPBAR */
.topbar{
  height:55px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 12px;
  border-bottom:1px solid var(--line);
  background:#111827;
}

.icon{
  font-size:20px;
  cursor:pointer;
}

.profile{
  width:36px;
  height:36px;
  border-radius:50%;
  background:#1f2937;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  right:-250px;
  width:220px;
  height:100%;
  background:#111827;
  border-left:1px solid var(--line);
  transition:.2s;
  padding:16px;
}

.sidebar.open{
  right:0;
}

.menu-btn{
  display:block;
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  background:#1f2937;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

/* CONTENT */
.container{
  padding:16px;
}

.page{
  display:none;
}

.page.active{
  display:block;
}

/* HOMEWORK */
.hw{
  background:#0b1322;
  border:1px solid var(--line);
  padding:12px;
  border-radius:12px;
  margin-top:10px;
}

/* PROFILE PANEL */
.profile-panel{
  position:fixed;
  top:60px;
  left:10px;
  right:10px;
  background:#111827;
  border:1px solid var(--line);
  border-radius:14px;
  padding:16px;
  display:none;
}

.profile-panel.show{
  display:block;
}

.small{
  color:var(--muted);
  font-size:.85rem;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="icon" onclick="toggleSidebar()">☰</div>
  <div>📚 التطبيق</div>
  <div class="profile" onclick="toggleProfile()">👤</div>
</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <button class="menu-btn" onclick="go('home')">🏠 الرئيسية</button>
  <button class="menu-btn" onclick="go('announcements')">📢 الإعلانات</button>
  <button class="menu-btn" onclick="go('homework')">📚 الواجبات</button>
</div>

<!-- PROFILE PANEL -->
<div id="profilePanel" class="profile-panel">
  <div><strong>👤 منتظر</strong></div>
  <div class="small">Username: montadar</div>
  <div class="small">الصف: 4A</div>
</div>

<!-- CONTENT -->
<div class="container">

  <!-- HOME -->
  <div id="home" class="page active">
    <h3>🏠 الرئيسية</h3>
    <p class="small">أهلاً بك 👋</p>
  </div>

  <!-- ANNOUNCEMENTS -->
  <div id="announcements" class="page">
    <h3>📢 الإعلانات</h3>
    <p class="small">لا توجد إعلانات حالياً</p>
  </div>

  <!-- HOMEWORK -->
  <div id="homework" class="page">
    <h3>📚 واجباتك</h3>
    <div id="hwList"></div>
  </div>

</div>

<script>

/* STUDENT */
const student = {
  name: "منتظر",
  username: "montadar",
  class: "4A"
};

/* DATA */
const homeworkData = [
  {title:"رياضيات", desc:"حل صفحة 32", class:"4A"},
  {title:"فيزياء", desc:"اقرأ الفصل الأول", class:"4A"},
  {title:"إنشاء", desc:"موضوع تعبير", class:"4B"}
];

/* NAV */
function go(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
  toggleSidebar(false);
}

/* SIDEBAR */
function toggleSidebar(force){
  const s = document.getElementById("sidebar");
  if(force===false){ s.classList.remove("open"); return; }
  s.classList.toggle("open");
}

/* PROFILE */
function toggleProfile(){
  document.getElementById("profilePanel").classList.toggle("show");
}

/* HOMEWORK FILTER */
function loadHW(){
  const list = document.getElementById("hwList");
  list.innerHTML = "";

  const filtered = homeworkData.filter(h => h.class === student.class);

  if(filtered.length === 0){
    list.innerHTML = `<p class="small">لا يوجد واجبات 🎉</p>`;
    return;
  }

  filtered.forEach(h=>{
    list.innerHTML += `
      <div class="hw">
        <b>${h.title}</b>
        <div class="small">${h.desc}</div>
      </div>
    `;
  });
}

loadHW();

</script>

</body>
</html>
