<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الطالب</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #3498db; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .loading { font-style: italic; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="studentName">جاري التحميل...</h1>
    
    <table>
        <thead>
            <tr>
                <th>المادة</th>
                <th>الدرجة</th>
            </tr>
        </thead>
        <tbody id="gradesTable">
            </tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 1. إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 2. ترتيب المواد المطلوب
    const subjectsOrder = [
        "الاسلامية", "العربية", "الانكليزية", "الفرنسية", 
        "الكردية", "جرائم البعث", "الرياضيات", 
        "الفيزياء", "الكيمياء", "الاحياء", "الحاسوب"
    ];

    async function fetchStudentData() {
        // ملاحظة: استبدل 'STUDENT_ID' بـ ID الطالب الفعلي أو اجلبه من رابط الصفحة
        const studentId = "replace_with_actual_id"; 
        const docRef = doc(db, "students", studentId);
        
        try {
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();

                // تحديث اسم الطالب (استخدام displayName من Firestore)
                document.getElementById('studentName').innerText = data.displayName || "اسم غير متوفر";

                // تحديث الجدول حسب الترتيب المحدد
                const tableBody = document.getElementById('gradesTable');
                tableBody.innerHTML = ""; // مسح رسالة التحميل

                subjectsOrder.forEach(subject => {
                    // نتحقق إذا كانت المادة موجودة في بيانات الطالب في Firestore
                    // افترضنا أن الدرجات مخزنة داخل حقل اسمه grades
                    const grade = (data.grades && data.grades[subject]) ? data.grades[subject] : "-";
                    
                    const row = `
                        <tr>
                            <td>${subject}</td>
                            <td>${grade}</td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });

            } else {
                document.getElementById('studentName').innerText = "لم يتم العثور على الطالب";
            }
        } catch (error) {
            console.error("Error fetching document:", error);
            document.getElementById('studentName').innerText = "خطأ في جلب البيانات";
        }
    }

    // تشغيل الدالة عند تحميل الصفحة
    fetchStudentData();
</script>

</body>
</html>
