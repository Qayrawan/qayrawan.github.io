<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Qayrawan - Student</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section class="screen" id="loginScreen">
    <div class="login-card">
      <div class="brand-row">
        <div class="brand-mark">≡</div>
        <div>
          <h1 class="title">Qayrawan</h1>
          <p class="subtitle">Student App Beta</p>
        </div>
      </div>
      <p class="lead">ادخل بحساب الطالب. الواجهة تفتح على الصف الخاص بيك فقط.</p>
      <div class="demo-list" id="demoUsers"></div>
      <label class="field-label">اسم المستخدم</label>
      <input id="usernameInput" class="input" type="text" autocomplete="username" placeholder="student01" />
      <label class="field-label">كلمة المرور</label>
      <input id="passwordInput" class="input" type="password" autocomplete="current-password" placeholder="1111" />
      <button id="loginBtn" class="btn primary" type="button">تسجيل الدخول</button>
      <p id="loginError" class="error"></p>
    </div>
  </section>
  <div class="app hidden" id="appScreen">
    <header class="topbar">
      <button class="icon-btn" id="menuBtn" type="button" aria-label="menu">☰</button>
      <div class="topbar-copy">
        <div class="app-name">Qayrawan</div>
        <div class="app-sub">Student App Beta</div>
      </div>
      <div class="topbar-actions">
        <span class="status-badge" id="statusBadge">Saved locally</span>
        <button class="icon-btn" id="settingsBtn" type="button" aria-label="settings">⚙</button>
      </div>
    </header>
    <aside class="drawer" id="drawer">
      <div class="drawer-head">
        <strong>Menu</strong>
        <button class="icon-btn" id="closeDrawerBtn" type="button" aria-label="close">←</button>
      </div>
      <button class="menu-link active" data-page="home" type="button">Home</button>
      <button class="menu-link" data-page="announcements" type="button">Announcements</button>
      <button class="menu-link" data-page="homework" type="button">Homework</button>
      <button class="menu-link" data-page="discussion" type="button">Discussion</button>
      <button class="menu-link" data-page="timetable" type="button">Timetable</button>
      <button class="menu-link" data-page="qa" type="button">Q&A</button>
      <button class="menu-link" data-page="profile" type="button">Profile</button>
      <button class="menu-link" data-page="settings" type="button">Settings</button>
    </aside>
    <main class="body">
      <div class="window" id="pageWindow"></div>
    </main>
  </div>
  <div class="overlay hidden" id="settingsOverlay">
    <div class="sheet">
      <div class="sheet-head">
        <button class="icon-btn" id="closeSettingsBtn" type="button" aria-label="back">←</button>
        <strong>Settings</strong>
        <div class="spacer"></div>
      </div>
      <div class="sheet-body">
        <section class="panel">
          <h3>Appearance</h3>
          <label class="toggle-row"><span>Dark mode</span><input id="themeToggle" type="checkbox" checked /></label>
          <label class="toggle-row"><span>Compact mode</span><input id="compactToggle" type="checkbox" /></label>
          <label class="toggle-row"><span>Show avatars</span><input id="avatarsToggle" type="checkbox" checked /></label>
          <label class="toggle-row"><span>Show full name</span><input id="fullNameToggle" type="checkbox" /></label>
        </section>
        <section class="panel">
          <h3>Language</h3>
          <div class="lang-grid">
            <button class="btn soft lang-btn active" data-lang="ar" type="button">العربية</button>
            <button class="btn soft lang-btn" data-lang="en" type="button">English</button>
          </div>
        </section>
        <section class="panel">
          <h3>Backup</h3>
          <div class="stack">
            <button id="exportBtn" class="btn soft" type="button">Export data</button>
            <button id="importBtn" class="btn soft" type="button">Import data</button>
            <button id="clearBtn" class="btn danger" type="button">Clear local data</button>
          </div>
          <input id="importInput" type="file" accept="application/json" hidden />
        </section>
        <section class="panel">
          <h3>Account</h3>
          <button id="logoutBtn" class="btn danger" type="button">Logout</button>
        </section>
      </div>
    </div>
  </div>
  <div class="toast hidden" id="toast"></div>
  <script src="../shared/config.js"></script>
  <script src="../shared/utils.js"></script>
  <script src="../shared/schema.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
